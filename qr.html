<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro QR Code Generator</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- QRCode Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+Thai:wght@400;600;700&display=swap');
        body {
            font-family: 'Inter', 'Noto Sans Thai', sans-serif;
        }
        /* Custom slider style */
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 18px;
            width: 18px;
            border-radius: 50%;
            background: #4f46e5;
            cursor: pointer;
            box-shadow: 0 0 2px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body class="min-h-screen bg-slate-50 p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <!-- Header -->
        <header class="flex items-center gap-3 mb-8">
            <div class="bg-indigo-600 p-2 rounded-xl text-white shadow-lg">
                <i data-lucide="qr-code" size="32"></i>
            </div>
            <div>
                <h1 class="text-2xl font-bold text-slate-800">Pro QR Generator</h1>
                <p class="text-slate-500 text-sm">สร้าง QR Code ระดับมืออาชีพได้ในไม่กี่วินาที</p>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Controls Section -->
            <div class="lg:col-span-2 space-y-6">
                <!-- Input Card -->
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <div class="flex items-center gap-2 mb-4 text-slate-700 font-semibold">
                        <i data-lucide="link" size="18"></i>
                        <span>ข้อมูลที่ต้องการสร้าง</span>
                    </div>
                    <textarea
                        id="qr-text"
                        placeholder="พิมพ์ข้อความหรือวาง URL ที่นี่..."
                        class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all outline-none resize-none h-32"
                    >https://www.google.com</textarea>
                </div>

                <!-- Customization Card -->
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <div class="flex items-center gap-2 mb-6 text-slate-700 font-semibold">
                        <i data-lucide="settings" size="18"></i>
                        <span>ปรับแต่งดีไซน์</span>
                    </div>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-4">
                            <label class="block">
                                <span class="text-sm text-slate-600 mb-1 block">สีของ QR Code</span>
                                <div class="flex items-center gap-3">
                                    <input 
                                        type="color" 
                                        id="fg-color"
                                        value="#000000"
                                        class="h-10 w-20 rounded cursor-pointer border-none"
                                    />
                                    <span id="fg-hex" class="text-sm font-mono text-slate-500 uppercase">#000000</span>
                                </div>
                            </label>

                            <label class="block">
                                <span class="text-sm text-slate-600 mb-1 block">สีพื้นหลัง</span>
                                <div class="flex items-center gap-3">
                                    <input 
                                        type="color" 
                                        id="bg-color"
                                        value="#ffffff"
                                        class="h-10 w-20 rounded cursor-pointer border-none shadow-inner"
                                    />
                                    <span id="bg-hex" class="text-sm font-mono text-slate-500 uppercase">#FFFFFF</span>
                                </div>
                            </label>
                        </div>

                        <div class="space-y-4">
                            <label class="block">
                                <span class="text-sm text-slate-600 mb-1 block">ขนาด (พิกเซล): <span id="size-display">256</span>px</span>
                                <input 
                                    type="range" 
                                    id="qr-size"
                                    min="128" 
                                    max="512" 
                                    step="32"
                                    value="256"
                                    class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-indigo-600"
                                />
                                <div class="flex justify-between text-[10px] text-slate-400 mt-1">
                                    <span>128px</span>
                                    <span>512px</span>
                                </div>
                            </label>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Preview Section -->
            <div class="lg:col-span-1">
                <div class="sticky top-8 space-y-4">
                    <div class="bg-white p-8 rounded-2xl shadow-xl border border-slate-200 flex flex-col items-center justify-center min-h-[400px]">
                        <div class="mb-6 font-semibold text-slate-400 text-sm tracking-widest uppercase text-center">Live Preview</div>
                        
                        <div 
                            id="qrcode-container"
                            class="p-4 rounded-lg shadow-inner transition-transform hover:scale-105 duration-300 bg-white"
                        >
                            <!-- QR Code will be generated here -->
                        </div>
                        
                        <div class="mt-8 w-full space-y-3">
                            <button
                                id="download-btn"
                                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 px-6 rounded-xl flex items-center justify-center gap-2 transition-all transform active:scale-95 shadow-lg shadow-indigo-200"
                            >
                                <i data-lucide="download" size="20"></i>
                                ดาวน์โหลด PNG
                            </button>
                            
                            <button
                                id="copy-btn"
                                class="w-full bg-white border border-slate-200 text-slate-600 hover:bg-slate-50 font-medium py-3 px-6 rounded-xl flex items-center justify-center gap-2 transition-all"
                            >
                                <i data-lucide="share-2" size="18"></i>
                                คัดลอกข้อความ
                            </button>
                        </div>
                    </div>

                    <div class="bg-indigo-50 border border-indigo-100 p-4 rounded-xl">
                        <p class="text-xs text-indigo-700 leading-relaxed text-center">
                            <strong>เคล็ดลับ:</strong> เลือกสีที่ตัดกัน (เช่น พื้นเข้ม-ตัวอ่อน หรือ พื้นอ่อน-ตัวเข้ม) เพื่อให้สแกนได้ง่ายขึ้น
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Feedback Toast -->
    <div id="toast" class="fixed bottom-8 left-1/2 transform -translate-x-1/2 bg-slate-800 text-white px-6 py-3 rounded-full shadow-2xl transition-all duration-300 opacity-0 pointer-events-none translate-y-4">
        คัดลอกข้อความแล้ว!
    </div>

    <script>
        // DOM Elements
        const textInput = document.getElementById('qr-text');
        const fgColorInput = document.getElementById('fg-color');
        const bgColorInput = document.getElementById('bg-color');
        const sizeInput = document.getElementById('qr-size');
        const sizeDisplay = document.getElementById('size-display');
        const fgHex = document.getElementById('fg-hex');
        const bgHex = document.getElementById('bg-hex');
        const qrcodeContainer = document.getElementById('qrcode-container');
        const downloadBtn = document.getElementById('download-btn');
        const copyBtn = document.getElementById('copy-btn');
        const toast = document.getElementById('toast');

        let qrInstance = null;

        // Initialize Lucide Icons
        lucide.createIcons();

        // Main Function to Generate QR Code
        function generateQR() {
            const text = textInput.value.trim() || " ";
            const size = parseInt(sizeInput.value);
            const fgColor = fgColorInput.value;
            const bgColor = bgColorInput.value;

            // Clear previous QR
            qrcodeContainer.innerHTML = "";
            qrcodeContainer.style.backgroundColor = bgColor;

            // Create new QR
            try {
                qrInstance = new QRCode(qrcodeContainer, {
                    text: text,
                    width: size,
                    height: size,
                    colorDark: fgColor,
                    colorLight: bgColor,
                    correctLevel: QRCode.CorrectLevel.H
                });
            } catch (error) {
                console.error("Failed to generate QR:", error);
            }
        }

        // Event Listeners for Live Update
        [textInput, fgColorInput, bgColorInput, sizeInput].forEach(el => {
            el.addEventListener('input', () => {
                // Update UI displays
                sizeDisplay.textContent = sizeInput.value;
                fgHex.textContent = fgColorInput.value.toUpperCase();
                bgHex.textContent = bgColorInput.value.toUpperCase();
                
                // Regenerate QR
                generateQR();
            });
        });

        // Download functionality
        downloadBtn.addEventListener('click', () => {
            const img = qrcodeContainer.querySelector('img');
            const canvas = qrcodeContainer.querySelector('canvas');
            
            if (!img && !canvas) return;

            const link = document.createElement('a');
            link.download = `qrcode-${Date.now()}.png`;
            
            if (canvas) {
                link.href = canvas.toDataURL("image/png");
            } else {
                link.href = img.src;
            }
            
            link.click();
        });

        // Copy functionality
        copyBtn.addEventListener('click', () => {
            const text = textInput.value;
            
            // Create temporary element to copy
            const textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            
            try {
                document.execCommand('copy');
                showToast("คัดลอกข้อความแล้ว!");
            } catch (err) {
                console.error('Copy failed', err);
            }
            
            document.body.removeChild(textArea);
        });

        function showToast(message) {
            toast.textContent = message;
            toast.classList.remove('opacity-0', 'translate-y-4', 'pointer-events-none');
            
            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-y-4', 'pointer-events-none');
            }, 2000);
        }

        // Initial Generation
        window.onload = () => {
            generateQR();
        };
    </script>
</body>
</html>
