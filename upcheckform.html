<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amway Lead CRM - Smart Analysis</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Phosphor Icons -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  
  <!-- Babel for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Supabase JS Client -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap');
    
    body {
      font-family: 'Noto Sans Thai', sans-serif;
    }

    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #475569; }
    
    @keyframes fadeIn { 
      from { opacity: 0; transform: translateY(8px); } 
      to { opacity: 1; transform: translateY(0); } 
    }
    .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
    
    .glass-card {
      background: rgba(30, 41, 59, 0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
  </style>
</head>
<body class="bg-slate-950 text-slate-200 font-sans overflow-hidden">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    // --- Constants ---
    const STATUS_OPTIONS = ['ยังไม่ได้ทัก', 'ทักแล้ว', 'นัดคุยแล้ว', 'สนใจ', 'ไม่สนใจ'];
    const STATUS_COLORS = {
      'ยังไม่ได้ทัก': 'bg-slate-600 text-slate-200',
      'ทักแล้ว': 'bg-blue-600/20 text-blue-400 border border-blue-600/50',
      'นัดคุยแล้ว': 'bg-yellow-600/20 text-yellow-400 border border-yellow-600/50',
      'สนใจ': 'bg-green-600/20 text-green-400 border border-green-600/50',
      'ไม่สนใจ': 'bg-red-600/20 text-red-400 border border-red-600/50',
    };

    const DEFAULT_PROSPECT = {
      name: '', nickname: '', age: '', gender: 'อื่นๆ', facebook_url: '', status: 'ยังไม่ได้ทัก',
      family_status: 'โสด', num_children: 'ไม่มี', family_obligations: '', family_notes: '',
      occupation: '', company: '', income_level: '<15K', job_satisfaction: 'เฉยๆ', financial_notes: '',
      hobbies: [], activities: '', lifestyle: 'Active', social_media_style: '',
      relationship: 'รู้จักกัน', how_we_met: '', extra_notes: ''
    };

    const CHILD_MAP = { 0: 'ไม่มี', 1: '1', 2: '2', 3: '3+' };
    const CHILD_VALUE_MAP = { 'ไม่มี': 0, '1': 1, '2': 2, '3+': 3 };

    const App = () => {
      // Data State
      const [prospects, setProspects] = useState([]);
      const [selectedLead, setSelectedLead] = useState(null);
      const [currentView, setCurrentView] = useState('list');
      const [formData, setFormData] = useState(DEFAULT_PROSPECT);
      const [searchQuery, setSearchQuery] = useState('');
      const [hobbyInput, setHobbyInput] = useState('');
      
      // Settings State
      const [supabaseUrl, setSupabaseUrl] = useState(localStorage.getItem('supabaseUrl') || '');
      const [supabaseKey, setSupabaseKey] = useState(localStorage.getItem('supabaseKey') || '');
      const [geminiApiKey, setGeminiApiKey] = useState(localStorage.getItem('geminiApiKey') || '');
      
      // AI State
      const [analyzing, setAnalyzing] = useState(false);
      const [analyzeLog, setAnalyzeLog] = useState([]);
      const [analysisLevel, setAnalysisLevel] = useState('medium');

      // 1. Defined helper functions early to avoid ReferenceErrors
      const saveSettings = () => {
        localStorage.setItem('supabaseUrl', supabaseUrl);
        localStorage.setItem('supabaseKey', supabaseKey);
        localStorage.setItem('geminiApiKey', geminiApiKey);
        alert('บันทึกการตั้งค่าเรียบร้อยแล้ว');
      };

      const copyText = (t) => {
        const el = document.createElement('textarea');
        el.value = t;
        document.body.appendChild(el);
        el.select();
        document.execCommand('copy');
        document.body.removeChild(el);
        alert('คัดลอกข้อความแล้ว!');
      };

      const supabaseClient = useMemo(() => {
        if (supabaseUrl && supabaseKey && window.supabase) {
          try {
            return window.supabase.createClient(supabaseUrl, supabaseKey);
          } catch (err) {
            return null;
          }
        }
        return null;
      }, [supabaseUrl, supabaseKey]);

      const fetchProspects = async () => {
        if (!supabaseClient) return;
        const { data, error } = await supabaseClient
          .from('aw_prospects')
          .select('*')
          .order('updated_at', { ascending: false });
        if (!error) setProspects(data || []);
      };

      useEffect(() => {
        if (supabaseClient) fetchProspects();
        else if (currentView !== 'settings' && (!supabaseUrl || !supabaseKey)) setCurrentView('settings');
      }, [supabaseClient]);

      const saveProspect = async () => {
        if (!supabaseClient) return alert('กรุณาตั้งค่า Supabase ก่อน');
        if (!formData.name) return alert('กรุณากรอกชื่อ');

        const now = new Date().toISOString();
        const cleanData = { ...formData };
        
        // Data Normalization for Children
        if (typeof cleanData.num_children === 'string') {
          cleanData.num_children = CHILD_VALUE_MAP[cleanData.num_children] ?? 0;
        } else if (cleanData.num_children === null || cleanData.num_children === undefined) {
          cleanData.num_children = 0;
        }
        cleanData.num_children = parseInt(cleanData.num_children) || 0;

        // Data Normalization for Age
        if (!cleanData.age || cleanData.age === '') {
          cleanData.age = null;
        } else {
          cleanData.age = parseInt(cleanData.age);
        }

        const dataToSave = { ...cleanData, updated_at: now };
        
        try {
          let savedData = null;
          if (formData.id) {
            const { data, error } = await supabaseClient.from('aw_prospects').update(dataToSave).eq('id', formData.id).select().single();
            if (error) throw error;
            savedData = data;
          } else {
            const { data, error } = await supabaseClient.from('aw_prospects').insert([dataToSave]).select().single();
            if (error) throw error;
            savedData = data;
          }
          fetchProspects();
          setCurrentView('detail');
          setSelectedLead(savedData);
        } catch (err) {
          alert("บันทึกข้อมูลไม่สำเร็จ: " + err.message);
        }
      };

      const updateLeadStatus = async (id, newStatus) => {
        if (!supabaseClient) return;
        const { error } = await supabaseClient.from('aw_prospects').update({ status: newStatus, updated_at: new Date().toISOString() }).eq('id', id);
        if (!error) {
          fetchProspects();
          if (selectedLead?.id === id) setSelectedLead({ ...selectedLead, status: newStatus });
        }
      };

      const callGemini = async (promptText, systemText) => {
        if (!geminiApiKey) throw new Error("ยังไม่ได้ตั้งค่า API Key");
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${geminiApiKey}`;
        const payload = {
          contents: [{ parts: [{ text: promptText }] }],
          systemInstruction: { parts: [{ text: systemText }] },
          generationConfig: { responseMimeType: "application/json" }
        };
        const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
        if (!res.ok) throw new Error("HTTP " + res.status);
        const data = await res.json();
        return JSON.parse(data.candidates[0].content.parts[0].text);
      };

      const handleAnalyseAndWrite = async () => {
        if (!selectedLead) return;
        setAnalyzing(true);
        setAnalyzeLog(['กำลังเตรียมข้อมูล...']);
        
        const context = `
ชื่อ: ${selectedLead.name} (${selectedLead.nickname || '-'})
อายุ: ${selectedLead.age || '-'}
ครอบครัว: ${selectedLead.family_status}, ลูก ${CHILD_MAP[selectedLead.num_children] || '0'}
อาชีพ: ${selectedLead.occupation || '-'}, รายได้ ${selectedLead.income_level}
อดิเรก: ${(selectedLead.hobbies || []).join(', ')}
ไลฟ์สไตล์: ${selectedLead.lifestyle}
ความสัมพันธ์: ${selectedLead.relationship}
        `.trim();

        let analyseSystem = "คุณเป็นผู้เชี่ยวชาญธุรกิจ Amway วิเคราะห์และตอบเป็นภาษาไทยในรูปแบบ JSON เท่านั้น ฟิลด์ที่ต้องมี: score, category, angle, product_focus, chat_topics (array string ของประเด็นชวนคุย)";
        if (analysisLevel === 'medium' || analysisLevel === 'deep') {
          analyseSystem += ", pain, approach, simulation";
          if (analysisLevel === 'deep') analyseSystem += ", personality";
        }

        try {
          setAnalyzeLog(prev => [...prev, '🤖 กำลังวิเคราะห์เชิงลึก...']);
          const analyseData = await callGemini(
            `วิเคราะห์โอกาสและประเด็นชวนคุยสำหรับเคสนี้:\n${context}\n\n*หมายเหตุ: แนะนำสินค้า Amway ที่เหมาะจริง (Nutrilite/Artistry ฯลฯ) พิจารณา UP Labs (3-Day Reset) เฉพาะเมื่อเห็นปัญหาเรื่องเผาผลาญ/น้ำหนัก/เหนื่อยง่าย`, 
            analyseSystem
          );

          setAnalyzeLog(prev => [...prev, '✍️ กำลังร่างข้อความทักทาย...']);
          const writerData = await callGemini(
            `ร่างข้อความทักทายภาษาไทย ห้ามพูดถึงแอมเวย์ สร้างสายสัมพันธ์จากข้อมูล:\n${context}\nผลวิเคราะห์: ${analyseData.angle}`,
            "คุณเป็น Copywriter สาย Network Marketing ภาษาไทย ตอบ JSON: message (ข้อความส่งหา), tone, hook"
          );

          const update = {
            analyse_score: analyseData.score,
            analyse_category: analyseData.category,
            analyse_angle: analyseData.angle,
            analyse_product: analyseData.product_focus,
            analyse_topics: JSON.stringify(analyseData.chat_topics || []),
            analyse_pain: analyseData.pain || '',
            analyse_approach: analyseData.approach || '',
            analyse_simulation: analyseData.simulation || '',
            analyse_personality: analyseData.personality || '',
            writer_message: writerData.message,
            writer_tone: writerData.tone,
            writer_hook: writerData.hook,
            analysed_at: new Date().toISOString(),
            updated_at: new Date().toISOString()
          };

          await supabaseClient.from('aw_prospects').update(update).eq('id', selectedLead.id);
          fetchProspects();
          setSelectedLead({ ...selectedLead, ...update });
          setAnalyzeLog(prev => [...prev, '🎉 สำเร็จ!']);
          setTimeout(() => setAnalyzing(false), 1000);
        } catch (err) {
          setAnalyzeLog(prev => [...prev, '❌ ข้อผิดพลาด: ' + err.message]);
          setAnalyzing(false);
        }
      };

      const getScoreColor = (score) => {
        if (!score) return 'bg-slate-700 text-slate-400';
        if (score >= 80) return 'bg-green-500/20 text-green-400 border border-green-500/50';
        if (score >= 65) return 'bg-yellow-500/20 text-yellow-400 border border-yellow-500/50';
        return 'bg-purple-500/20 text-purple-400 border border-purple-500/50';
      };

      // --- Render Functions ---
      const renderSidebar = () => {
        const filtered = prospects.filter(p => p.name.includes(searchQuery) || (p.nickname && p.nickname.includes(searchQuery)));
        return (
          <div className="w-[280px] bg-slate-900 border-r border-slate-800 flex flex-col h-full shrink-0">
            <div className="p-4 border-b border-slate-800">
              <div className="flex items-center gap-2 mb-4">
                <div className="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center">
                  <i className="ph-fill ph-user-focus text-white"></i>
                </div>
                <h1 className="text-lg font-bold">Amway CRM</h1>
              </div>
              <button onClick={() => { setFormData(DEFAULT_PROSPECT); setCurrentView('form'); setSelectedLead(null); }}
                className="w-full bg-blue-600 hover:bg-blue-500 py-2 rounded-lg flex items-center justify-center gap-2 transition-all">
                <i className="ph ph-plus-circle"></i> Add New Lead
              </button>
            </div>
            <div className="p-4 border-b border-slate-800">
              <div className="relative">
                <i className="ph ph-magnifying-glass absolute left-3 top-3 text-slate-500"></i>
                <input type="text" placeholder="ค้นหาชื่อ..." value={searchQuery} onChange={e => setSearchQuery(e.target.value)}
                  className="w-full bg-slate-950 border border-slate-800 rounded-md py-2 pl-9 text-sm focus:border-blue-500 outline-none text-white" />
              </div>
            </div>
            <div className="flex-1 overflow-y-auto p-2 space-y-1 custom-scrollbar">
              {filtered.map(p => (
                <div key={p.id} onClick={() => { setSelectedLead(p); setCurrentView('detail'); }}
                  className={`p-3 rounded-lg cursor-pointer border transition-all ${selectedLead?.id === p.id ? 'bg-slate-800 border-slate-700 shadow-lg' : 'border-transparent hover:bg-slate-800/40'}`}>
                  <div className="flex justify-between items-start">
                    <span className="font-medium text-slate-200 truncate">{p.gender === 'ชาย' ? '👨' : '👩'} {p.name}</span>
                    {p.analyse_score && <span className={`text-[10px] px-1.5 py-0.5 rounded font-bold ${getScoreColor(p.analyse_score)}`}>{p.analyse_score}</span>}
                  </div>
                  <div className="text-[11px] text-slate-500 mt-1 truncate">{p.occupation || '-'}</div>
                  <div className={`mt-2 inline-block text-[9px] px-1.5 py-0.5 rounded-full ${STATUS_COLORS[p.status || 'ยังไม่ได้ทัก']}`}>{p.status || 'ยังไม่ได้ทัก'}</div>
                </div>
              ))}
            </div>
            <button onClick={() => setCurrentView('settings')} className="p-4 text-slate-500 hover:text-slate-300 text-sm flex items-center gap-2 transition-colors">
              <i className="ph ph-gear"></i> Settings & Database
            </button>
          </div>
        );
      };

      const renderDetail = () => {
        if (!selectedLead) return null;
        const lead = selectedLead;
        let chatTopics = [];
        try {
          chatTopics = JSON.parse(lead.analyse_topics || "[]");
        } catch(e) {
          chatTopics = [];
        }

        return (
          <div className="flex-1 overflow-y-auto bg-slate-950 p-6 md:p-8 custom-scrollbar animate-fade-in">
            <div className="max-w-5xl mx-auto space-y-6 pb-16">
              {/* Header Profile */}
              <div className="glass-card rounded-2xl p-6 relative overflow-hidden border border-slate-800 shadow-2xl">
                <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 relative z-10">
                  <div className="flex items-center gap-5">
                    <div className="w-20 h-20 rounded-2xl bg-slate-800 border border-slate-700 flex items-center justify-center text-4xl shadow-inner">
                      {lead.gender === 'ชาย' ? '👨' : '👩'}
                    </div>
                    <div>
                      <h2 className="text-3xl font-bold text-white">{lead.name} {lead.nickname && <span className="text-slate-500 font-medium">({lead.nickname})</span>}</h2>
                      <div className="flex items-center gap-3 mt-2 text-slate-400 text-sm">
                        <span><i className="ph ph-calendar"></i> {lead.age || '-'} ปี</span>
                        <span>•</span>
                        <span><i className="ph ph-briefcase"></i> {lead.occupation || '-'}</span>
                      </div>
                    </div>
                  </div>
                  <div className="flex flex-wrap items-center gap-3">
                    <select value={lead.status || 'ยังไม่ได้ทัก'} onChange={e => updateLeadStatus(lead.id, e.target.value)}
                      className={`px-3 py-2 rounded-lg text-sm font-semibold border outline-none cursor-pointer ${STATUS_COLORS[lead.status || 'ยังไม่ได้ทัก']}`}>
                      {STATUS_OPTIONS.map(o => <option key={o} value={o} className="bg-slate-900">{o}</option>)}
                    </select>
                    <button onClick={() => { setFormData(lead); setCurrentView('form'); }} className="px-4 py-2 bg-slate-800 border border-slate-700 rounded-lg text-sm hover:bg-slate-700 transition">แก้ไขข้อมูล</button>
                    <div className="flex bg-slate-900 border border-slate-700 rounded-lg p-1 gap-1">
                      {['short', 'medium', 'deep'].map(l => (
                        <button key={l} onClick={() => setAnalysisLevel(l)} className={`px-2.5 py-1 text-[10px] font-bold rounded-md transition-all ${analysisLevel === l ? 'bg-indigo-600 text-white' : 'text-slate-500 hover:text-slate-300'}`}>{l.toUpperCase()}</button>
                      ))}
                    </div>
                    <button onClick={handleAnalyseAndWrite} disabled={analyzing} className="px-5 py-2 bg-indigo-600 hover:bg-indigo-500 rounded-lg text-sm font-bold flex items-center gap-2 shadow-lg shadow-indigo-900/40 transition-all">
                      {analyzing ? <i className="ph ph-spinner ph-spin"></i> : <i className="ph ph-brain"></i>} วิเคราะห์เคส
                    </button>
                  </div>
                </div>
              </div>

              {/* Action: Copy Box (Only if analysed) */}
              {lead.writer_message && (
                <div className="grid grid-cols-1 gap-6">
                   <div className="bg-blue-600/10 border border-blue-500/30 rounded-2xl p-6">
                    <div className="flex justify-between items-center mb-4">
                      <h3 className="text-lg font-bold text-blue-400 flex items-center gap-2"><i className="ph-fill ph-paper-plane-tilt"></i> Online Contact Message</h3>
                      <span className="text-[10px] bg-blue-500/20 text-blue-300 px-2 py-1 rounded-full uppercase font-black tracking-widest">Tone: {lead.writer_tone || 'Casual'}</span>
                    </div>
                    <div className="relative group">
                      <div className="bg-slate-900/80 border border-slate-800 rounded-xl p-6 text-slate-200 leading-relaxed text-lg whitespace-pre-wrap min-h-[120px]">
                        {lead.writer_message}
                      </div>
                      <button onClick={() => copyText(lead.writer_message)} className="absolute top-4 right-4 p-3 bg-blue-600 hover:bg-blue-500 text-white rounded-xl shadow-xl transition-all active:scale-95 flex items-center gap-2">
                        <i className="ph ph-copy text-xl"></i> คัดลอกไปส่ง
                      </button>
                    </div>
                    {lead.writer_hook && <p className="mt-4 text-xs text-slate-500 italic flex items-center gap-2"><i className="ph ph-info text-blue-500"></i> กลยุทธ์การเปิดใจ: {lead.writer_hook}</p>}
                   </div>
                </div>
              )}

              {/* Smart Insights & Bullet Topics */}
              {lead.analyse_score && (
                <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                  <div className="bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-lg">
                    <div className="flex justify-between items-center mb-6">
                      <h3 className="font-bold text-white flex items-center gap-2"><i className="ph ph-chats-circle text-emerald-400 text-xl"></i> ประเด็นชวนคุย (Conversation Topics)</h3>
                      <div className={`text-4xl font-black ${getScoreColor(lead.analyse_score).split(' ')[1]}`}>{lead.analyse_score}</div>
                    </div>
                    <ul className="space-y-4">
                      {chatTopics.length > 0 ? chatTopics.map((topic, i) => (
                        <li key={i} className="flex items-start gap-4 text-slate-300 bg-slate-950/50 p-4 rounded-xl border border-slate-800/50 transition-all hover:border-emerald-500/30">
                          <i className="ph-fill ph-check-circle text-emerald-500 mt-1 text-lg"></i>
                          <span className="text-sm md:text-base leading-relaxed">{topic}</span>
                        </li>
                      )) : <li className="text-slate-500 italic">ไม่มีข้อมูลประเด็นชวนคุย</li>}
                    </ul>
                  </div>

                  <div className="bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-lg">
                    <h3 className="font-bold text-white mb-6 flex items-center gap-2"><i className="ph ph-star text-amber-400 text-xl"></i> สินค้าที่แนะนำ (Product Focus)</h3>
                    <div className="bg-slate-950 p-5 rounded-xl border border-slate-800 mb-6 group transition-all hover:border-amber-500/30">
                      <div className="text-emerald-400 font-bold text-2xl mb-2 flex items-center gap-2">
                        <i className="ph ph-package text-amber-500"></i> {lead.analyse_product}
                      </div>
                      <div className="text-slate-400 text-sm leading-relaxed">{lead.analyse_angle}</div>
                    </div>
                    {lead.analyse_pain && (
                      <div className="p-5 bg-red-950/20 border border-red-900/30 rounded-xl">
                        <div className="text-red-400 text-xs font-bold uppercase mb-2 tracking-widest flex items-center gap-2">
                           <i className="ph ph-shield-warning"></i> Pain Point สำคัญ
                        </div>
                        <div className="text-slate-300 text-sm leading-relaxed">{lead.analyse_pain}</div>
                      </div>
                    )}
                  </div>
                </div>
              )}

              {/* Data Grid */}
              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                {[
                  { icon: 'ph ph-heart text-pink-500', title: 'Family', content: `${lead.family_status}, ลูก ${CHILD_MAP[lead.num_children] || '0'} คน` },
                  { icon: 'ph ph-briefcase text-amber-500', title: 'Finance', content: lead.income_level },
                  { icon: 'ph ph-activity text-green-500', title: 'Lifestyle', content: lead.lifestyle },
                  { icon: 'ph ph-link text-purple-500', title: 'Relation', content: lead.relationship }
                ].map((item, idx) => (
                  <div key={idx} className="bg-slate-900/40 border border-slate-800 p-5 rounded-2xl">
                    <div className="flex items-center gap-2 mb-3 text-slate-500 text-xs font-bold uppercase tracking-widest">
                      <i className={item.icon + " text-lg"}></i> {item.title}
                    </div>
                    <div className="text-slate-200 font-semibold">{item.content}</div>
                  </div>
                ))}
              </div>
            </div>

            {/* Analysis Overlay Loading */}
            {analyzing && (
              <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-md z-50 flex items-center justify-center p-6">
                <div className="max-w-sm w-full p-10 bg-slate-900 border border-slate-800 rounded-3xl flex flex-col items-center gap-8 shadow-2xl">
                  <div className="relative">
                    <div className="w-24 h-24 border-4 border-indigo-500/20 border-t-indigo-500 rounded-full animate-spin"></div>
                    <i className="ph ph-brain absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-4xl text-indigo-400"></i>
                  </div>
                  <div className="text-center">
                    <h3 className="text-2xl font-bold mb-4 text-white">AI กำลังวิเคราะห์...</h3>
                    <div className="space-y-2 h-12">
                      {analyzeLog.slice(-1).map((log, i) => <div key={i} className="text-sm text-indigo-400 font-mono animate-pulse">{log}</div>)}
                    </div>
                  </div>
                </div>
              </div>
            )}
          </div>
        );
      };

      const renderForm = () => {
        const renderInput = (label, field, type="text", isArea=false) => (
          <div className="mb-6">
            <label className="text-[10px] font-black text-slate-500 uppercase block mb-2 tracking-widest">{label}</label>
            {isArea ? (
              <textarea value={formData[field] || ''} onChange={e => setFormData({...formData, [field]: e.target.value})}
                className="w-full bg-slate-950 border border-slate-800 rounded-xl p-4 text-sm focus:border-blue-500 outline-none text-white transition-all" rows="2" />
            ) : (
              <input type={type} value={formData[field] || ''} onChange={e => setFormData({...formData, [field]: e.target.value})}
                className="w-full bg-slate-950 border border-slate-800 rounded-xl p-4 text-sm focus:border-blue-500 outline-none text-white transition-all" />
            )}
          </div>
        );

        const renderRadio = (label, field, options) => {
          let val = formData[field];
          if (field === 'num_children' && typeof val === 'number') val = CHILD_MAP[val] || 'ไม่มี';
          return (
            <div className="mb-6">
              <label className="text-[10px] font-black text-slate-500 uppercase block mb-3 tracking-widest">{label}</label>
              <div className="flex flex-wrap gap-2">
                {options.map(o => (
                  <button key={o} onClick={() => setFormData({...formData, [field]: o})}
                    className={`px-4 py-2.5 rounded-xl text-xs font-bold border transition-all ${val === o ? 'bg-blue-600 border-blue-500 text-white shadow-lg shadow-blue-900/20' : 'bg-slate-900 border-slate-800 text-slate-400 hover:border-slate-700'}`}>
                    {o}
                  </button>
                ))}
              </div>
            </div>
          );
        };

        return (
          <div className="flex-1 overflow-y-auto bg-slate-950 p-6 md:p-12 custom-scrollbar">
            <div className="max-w-4xl mx-auto pb-24">
              <div className="flex justify-between items-center mb-10">
                <h2 className="text-4xl font-black text-white">{formData.id ? 'แก้ไขข้อมูล Lead' : 'เพิ่มผู้มุ่งหวังใหม่'}</h2>
                <div className="flex gap-4">
                  <button onClick={() => formData.id ? setCurrentView('detail') : setCurrentView('list')} className="px-6 py-3 rounded-xl text-sm font-bold text-slate-400 hover:text-white transition">ยกเลิก</button>
                  <button onClick={saveProspect} className="px-8 py-3 bg-blue-600 rounded-xl text-sm font-black text-white hover:bg-blue-500 shadow-xl shadow-blue-900/30 flex items-center gap-3">
                    <i className="ph-fill ph-floppy-disk text-xl"></i> บันทึกข้อมูล
                  </button>
                </div>
              </div>

              <div className="grid grid-cols-1 md:grid-cols-2 gap-x-10">
                <div className="space-y-8">
                   <div className="p-8 bg-slate-900/60 rounded-3xl border border-slate-800">
                    <h3 className="text-xl font-bold mb-6 text-blue-400 flex items-center gap-3 border-b border-slate-800/50 pb-4"><i className="ph ph-identification-card"></i> Identity</h3>
                    {renderInput("ชื่อ-นามสกุล", "name")}
                    {renderInput("ชื่อเล่น", "nickname")}
                    {renderInput("อายุ", "age", "number")}
                    {renderRadio("เพศ", "gender", ["ชาย", "หญิง", "อื่นๆ"])}
                   </div>
                   <div className="p-8 bg-slate-900/60 rounded-3xl border border-slate-800">
                    <h3 className="text-xl font-bold mb-6 text-pink-400 flex items-center gap-3 border-b border-slate-800/50 pb-4"><i className="ph ph-heart"></i> Family</h3>
                    {renderRadio("สถานะครอบครัว", "family_status", ["โสด", "แต่งงาน", "มีแฟน", "หย่า"])}
                    {renderRadio("จำนวนบุตร", "num_children", ["ไม่มี", "1", "2", "3+"])}
                    {renderInput("ภาระครอบครัว/ความรับผิดชอบ", "family_obligations", "text", true)}
                   </div>
                </div>
                <div className="space-y-8">
                  <div className="p-8 bg-slate-900/60 rounded-3xl border border-slate-800">
                    <h3 className="text-xl font-bold mb-6 text-amber-400 flex items-center gap-3 border-b border-slate-800/50 pb-4"><i className="ph ph-briefcase"></i> Occupation & Finance</h3>
                    {renderInput("อาชีพ", "occupation")}
                    {renderRadio("ระดับรายได้", "income_level", ["<15K", "15-30K", "30-50K", "50K+", "ไม่แน่นอน"])}
                    {renderRadio("ความพอใจในงาน", "job_satisfaction", ["พอใจ", "เฉยๆ", "บ่น", "อยากเปลี่ยน"])}
                   </div>
                   <div className="p-8 bg-slate-900/60 rounded-3xl border border-slate-800">
                    <h3 className="text-xl font-bold mb-6 text-green-400 flex items-center gap-3 border-b border-slate-800/50 pb-4"><i className="ph ph-bicycle"></i> Recreation</h3>
                    <div className="mb-6">
                      <label className="text-[10px] font-black text-slate-500 uppercase block mb-3 tracking-widest">งานอดิเรก (Enter เพื่อเพิ่ม)</label>
                      <div className="flex flex-wrap gap-2 bg-slate-950 border border-slate-800 rounded-xl p-4 min-h-[56px]">
                        {(formData.hobbies || []).map(h => (
                          <span key={h} className="bg-blue-600/20 text-blue-400 border border-blue-600/40 px-3 py-1.5 rounded-lg text-xs font-bold flex items-center gap-2">
                            {h} <i className="ph ph-x cursor-pointer hover:text-white" onClick={() => setFormData({...formData, hobbies: formData.hobbies.filter(i => i !== h)})}></i>
                          </span>
                        ))}
                        <input type="text" value={hobbyInput} onChange={e => setHobbyInput(e.target.value)} 
                          onKeyDown={e => { if(e.key === 'Enter') { e.preventDefault(); if(hobbyInput.trim()) { setFormData({...formData, hobbies: [...(formData.hobbies||[]), hobbyInput.trim()]}); setHobbyInput(''); } } }}
                          className="bg-transparent border-none outline-none text-sm flex-1 min-w-[80px] text-white" placeholder="..." />
                      </div>
                    </div>
                    {renderRadio("ไลฟ์สไตล์", "lifestyle", ["Active", "Health", "Family", "Business", "Creative"])}
                   </div>
                </div>
              </div>
            </div>
          </div>
        );
      };

      const renderSettings = () => (
        <div className="flex-1 overflow-y-auto bg-slate-950 p-6 md:p-12 custom-scrollbar">
          <div className="max-w-2xl mx-auto space-y-10">
            <h2 className="text-4xl font-black flex items-center gap-4 text-white"><i className="ph ph-gear-six text-slate-500"></i> Settings</h2>
            <div className="bg-slate-900 border border-slate-800 rounded-3xl p-10 space-y-8 shadow-2xl">
              <div className="space-y-6">
                <h3 className="text-xl font-bold text-emerald-400 flex items-center gap-3 border-b border-slate-800 pb-4"><i className="ph ph-database"></i> Supabase Connection</h3>
                <div><label className="text-[10px] font-black text-slate-500 uppercase block mb-2 tracking-widest">Project URL</label><input value={supabaseUrl} onChange={e => setSupabaseUrl(e.target.value)} className="w-full bg-slate-950 border border-slate-800 rounded-xl p-4 focus:border-indigo-500 outline-none font-mono text-sm text-white" placeholder="https://..." /></div>
                <div><label className="text-[10px] font-black text-slate-500 uppercase block mb-2 tracking-widest">Anon Key</label><input type="password" value={supabaseKey} onChange={e => setSupabaseKey(e.target.value)} className="w-full bg-slate-950 border border-slate-800 rounded-xl p-4 focus:border-indigo-500 outline-none font-mono text-sm text-white" placeholder="..." /></div>
              </div>
              <div className="space-y-6 pt-4">
                <h3 className="text-xl font-bold text-indigo-400 flex items-center gap-3 border-b border-slate-800 pb-4"><i className="ph ph-brain"></i> Google Gemini AI</h3>
                <div><label className="text-[10px] font-black text-slate-500 uppercase block mb-2 tracking-widest">Gemini API Key</label><input type="password" value={geminiApiKey} onChange={e => setGeminiApiKey(e.target.value)} className="w-full bg-slate-950 border border-slate-800 rounded-xl p-4 focus:border-indigo-500 outline-none font-mono text-sm text-white" placeholder="..." /></div>
              </div>
              <button onClick={saveSettings} className="w-full py-5 bg-indigo-600 hover:bg-indigo-500 rounded-2xl font-black text-xl text-white transition-all shadow-xl shadow-indigo-900/40">SAVE CONFIGURATIONS</button>
            </div>
            
            <div className="p-8 bg-amber-950/10 border border-amber-900/30 rounded-3xl">
              <h4 className="text-lg font-bold text-amber-400 mb-4 flex items-center gap-3"><i className="ph ph-warning-circle text-xl"></i> SQL Update Required</h4>
              <p className="text-sm text-slate-400 leading-relaxed mb-4">เพื่อให้ระบบรองรับฟีเจอร์ "ประเด็นชวนคุย" กรุณาคัดลอกคำสั่งนี้ไปรันใน Supabase SQL Editor:</p>
              <pre className="bg-slate-950 p-6 rounded-2xl text-[11px] text-amber-200 overflow-x-auto font-mono border border-amber-900/20">ALTER TABLE aw_prospects ADD COLUMN IF NOT EXISTS analyse_topics text;</pre>
            </div>
          </div>
        </div>
      );

      return (
        <div className="flex h-screen bg-slate-950 text-slate-200 font-sans overflow-hidden">
          {renderSidebar()}
          <main className="flex-1 flex flex-col overflow-hidden relative">
            {currentView === 'list' && (
              <div className="flex-1 flex flex-col items-center justify-center text-slate-600 animate-fade-in">
                <div className="w-40 h-40 bg-slate-900 rounded-[3rem] flex items-center justify-center mb-10 border border-slate-800 shadow-2xl">
                  <i className="ph ph-users text-8xl opacity-20"></i>
                </div>
                <h3 className="text-3xl font-black text-slate-400">Amway CRM Smart System</h3>
                <p className="mt-4 text-slate-600 text-lg font-medium">กรุณาเลือกผู้มุ่งหวัง หรือเพิ่มข้อมูลใหม่เพื่อเริ่มการวิเคราะห์</p>
                {!supabaseClient && (
                  <button onClick={() => setCurrentView('settings')} className="mt-10 px-8 py-3 bg-indigo-600/20 text-indigo-400 border border-indigo-500/30 rounded-2xl font-bold hover:bg-indigo-600 hover:text-white transition-all">ไปที่ตั้งค่าเพื่อเชื่อมต่อระบบ</button>
                )}
              </div>
            )}
            {currentView === 'form' && renderForm()}
            {currentView === 'detail' && renderDetail()}
            {currentView === 'settings' && renderSettings()}
          </main>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
