<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amway Lead CRM</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Phosphor Icons -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  
  <!-- Babel for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Supabase JS Client -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    /* Custom Scrollbar & Animations */
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #475569; }
    @keyframes fadeIn { 
      from { opacity: 0; transform: translateY(5px); } 
      to { opacity: 1; transform: translateY(0); } 
    }
    .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
  </style>
</head>
<body class="bg-slate-950 text-slate-200 font-sans overflow-hidden">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    // --- Constants ---
    const STATUS_OPTIONS = ['ยังไม่ได้ทัก', 'ทักแล้ว', 'นัดคุยแล้ว', 'สนใจ', 'ไม่สนใจ'];
    const STATUS_COLORS = {
      'ยังไม่ได้ทัก': 'bg-slate-600 text-slate-200',
      'ทักแล้ว': 'bg-blue-600/20 text-blue-400 border border-blue-600/50',
      'นัดคุยแล้ว': 'bg-yellow-600/20 text-yellow-400 border border-yellow-600/50',
      'สนใจ': 'bg-green-600/20 text-green-400 border border-green-600/50',
      'ไม่สนใจ': 'bg-red-600/20 text-red-400 border border-red-600/50',
    };

    const DEFAULT_PROSPECT = {
      name: '', nickname: '', age: '', gender: 'อื่นๆ', facebook_url: '', status: 'ยังไม่ได้ทัก',
      family_status: 'โสด', num_children: 'ไม่มี', family_obligations: '', family_notes: '',
      occupation: '', company: '', income_level: '<15K', job_satisfaction: 'เฉยๆ', financial_notes: '',
      hobbies: [], activities: '', lifestyle: 'Active', social_media_style: '',
      relationship: 'รู้จักกัน', how_we_met: '', extra_notes: ''
    };

    // Mapping for database integer to UI text
    const CHILD_MAP = {
      0: 'ไม่มี',
      1: '1',
      2: '2',
      3: '3+'
    };
    const CHILD_VALUE_MAP = {
      'ไม่มี': 0,
      '1': 1,
      '2': 2,
      '3+': 3
    };

    const App = () => {
      // Data State
      const [prospects, setProspects] = useState([]);
      const [selectedLead, setSelectedLead] = useState(null);
      const [currentView, setCurrentView] = useState('list');
      const [formData, setFormData] = useState(DEFAULT_PROSPECT);
      const [searchQuery, setSearchQuery] = useState('');
      const [hobbyInput, setHobbyInput] = useState('');
      
      // Settings State
      const [supabaseUrl, setSupabaseUrl] = useState(localStorage.getItem('supabaseUrl') || '');
      const [supabaseKey, setSupabaseKey] = useState(localStorage.getItem('supabaseKey') || '');
      const [geminiApiKey, setGeminiApiKey] = useState(localStorage.getItem('geminiApiKey') || '');
      
      // AI State
      const [analyzing, setAnalyzing] = useState(false);
      const [analyzeLog, setAnalyzeLog] = useState([]);
      const [analysisLevel, setAnalysisLevel] = useState('medium');

      // Initialize Supabase Client
      const supabaseClient = useMemo(() => {
        if (supabaseUrl && supabaseKey && window.supabase) {
          try {
            return window.supabase.createClient(supabaseUrl, supabaseKey);
          } catch (err) {
            console.error("Invalid Supabase credentials:", err);
            return null;
          }
        }
        return null;
      }, [supabaseUrl, supabaseKey]);

      // Fetch Data
      const fetchProspects = async () => {
        if (!supabaseClient) return;
        const { data, error } = await supabaseClient
          .from('aw_prospects')
          .select('*')
          .order('updated_at', { ascending: false });
          
        if (error) {
          console.error("Error fetching data:", error);
        } else {
          setProspects(data || []);
        }
      };

      useEffect(() => {
        if (supabaseClient) {
          fetchProspects();
        } else if (currentView !== 'settings' && (!supabaseUrl || !supabaseKey)) {
          setCurrentView('settings');
        }
      }, [supabaseClient]);

      // CRUD Helpers
      const saveProspect = async () => {
        if (!supabaseClient) return alert('กรุณาตั้งค่า Supabase ในหน้า Settings ก่อน');
        if (!formData.name) return alert('กรุณากรอกชื่อ');

        const now = new Date().toISOString();
        
        // --- Data Cleaning ---
        const cleanData = { ...formData };
        
        // Robust num_children conversion
        if (typeof cleanData.num_children === 'string') {
          cleanData.num_children = CHILD_VALUE_MAP[cleanData.num_children] ?? 0;
        } else {
          cleanData.num_children = parseInt(cleanData.num_children) || 0;
        }

        // Handle age (must be number or null)
        if (cleanData.age === '' || cleanData.age === null || cleanData.age === undefined) {
          cleanData.age = null;
        } else {
          const parsedAge = parseInt(cleanData.age);
          cleanData.age = isNaN(parsedAge) ? null : parsedAge;
        }

        const dataToSave = { ...cleanData, updated_at: now };
        
        try {
          let savedData = null;
          if (formData.id) {
            const { data, error } = await supabaseClient
              .from('aw_prospects')
              .update(dataToSave)
              .eq('id', formData.id)
              .select()
              .single();
            if (error) throw error;
            savedData = data;
          } else {
            const { data, error } = await supabaseClient
              .from('aw_prospects')
              .insert([dataToSave])
              .select()
              .single();
            if (error) throw error;
            savedData = data;
          }
          
          fetchProspects();
          setCurrentView('detail');
          setSelectedLead(savedData);
        } catch (err) {
          console.error("Error saving:", err);
          alert("บันทึกข้อมูลไม่สำเร็จ: " + err.message);
        }
      };

      const updateLeadStatus = async (id, newStatus) => {
        if (!supabaseClient) return;
        try {
          const { error } = await supabaseClient
            .from('aw_prospects')
            .update({ status: newStatus, updated_at: new Date().toISOString() })
            .eq('id', id);
            
          if (error) throw error;
          fetchProspects();
          if (selectedLead && selectedLead.id === id) {
            setSelectedLead({ ...selectedLead, status: newStatus });
          }
        } catch (err) {
          console.error("Error updating status:", err);
        }
      };

      const getScoreColor = (score) => {
        if (!score) return 'bg-slate-700 text-slate-400';
        if (score >= 80) return 'bg-green-500/20 text-green-400 border border-green-500/50';
        if (score >= 65) return 'bg-yellow-500/20 text-yellow-400 border border-yellow-500/50';
        return 'bg-purple-500/20 text-purple-400 border border-purple-500/50';
      };

      // AI Helpers
      const buildAIContext = (lead) => {
        // UI uses labels, but context should be clear
        const childrenDisplay = CHILD_MAP[lead.num_children] || lead.num_children || '0';
        return `
ชื่อ: ${lead.name} (${lead.nickname || '-'})
อายุ: ${lead.age || '-'} ปี
เพศ: ${lead.gender}
--- FAMILY ---
สถานะ: ${lead.family_status}
ลูก: ${childrenDisplay} คน
พันธะ: ${lead.family_obligations || '-'}
--- OCCUPATION ---
อาชีพ: ${lead.occupation || '-'}
บริษัท: ${lead.company || '-'}
รายได้: ${lead.income_level}
ความพึงพอใจ: ${lead.job_satisfaction}
สัญญาณ: ${lead.financial_notes || '-'}
--- RECREATION ---
งานอดิเรก: ${(lead.hobbies || []).join(', ') || '-'}
กิจกรรม: ${lead.activities || '-'}
ไลฟ์สไตล์: ${lead.lifestyle}
--- MESSAGE ---
ความสัมพันธ์: ${lead.relationship}
เจอที่: ${lead.how_we_met || '-'}
หมายเหตุ: ${lead.extra_notes || '-'}
        `.trim();
      };

      const callGemini = async (promptText, systemText) => {
        if (!geminiApiKey) throw new Error("ยังไม่ได้ตั้งค่า Gemini API Key");
        
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${geminiApiKey}`;
        const payload = {
          contents: [{ parts: [{ text: promptText }] }],
          systemInstruction: { parts: [{ text: systemText }] },
          generationConfig: { responseMimeType: "application/json" }
        };

        let retries = 3;
        while (retries > 0) {
          try {
            const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
            if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
            const data = await res.json();
            const textResponse = data.candidates?.[0]?.content?.parts?.[0]?.text;
            if (!textResponse) throw new Error("Empty response");
            return JSON.parse(textResponse);
          } catch (err) {
            retries--;
            if (retries === 0) throw err;
            await new Promise(r => setTimeout(r, 1500));
          }
        }
      };

      const handleAnalyseAndWrite = async () => {
        if (!selectedLead) return;
        setAnalyzing(true);
        setAnalyzeLog(['เตรียมข้อมูล Prospect...']);
        
        const context = buildAIContext(selectedLead);
        let analyseData = null;
        let writerData = null;

        let analyseSystemPrompt = "คุณเป็น Amway business analyst ผู้เชี่ยวชาญ ตอบข้อมูลทุก field ใน JSON เป็นภาษาไทยเท่านั้น ไม่มี markdown โครงสร้างต้องมี: ";
        let writerSystemPrompt = "คุณเป็น copywriter เชี่ยวชาญ network marketing เขียนภาษาไทยเท่านั้น ตอบข้อมูลทุก field ใน JSON เป็นภาษาไทย ไม่มี markdown โครงสร้างต้องมี: ";

        if (analysisLevel === 'short') {
          analyseSystemPrompt += "score(number), category(income/health/biz/family), angle(string), product_focus(string)";
          writerSystemPrompt += "message(string), hook(string)";
        } else if (analysisLevel === 'medium') {
          analyseSystemPrompt += "score(number), category(income/health/biz/family), angle(string), pain(string), product_focus(string), approach(string), simulation(string สถานการณ์จำลองที่จะเกิดขึ้น)";
          writerSystemPrompt += "message(string), tone(string), hook(string), conversation_example(string บทสนทนาตัวอย่าง), follow_up(string ข้อความทักครั้งต่อไป)";
        } else {
          analyseSystemPrompt += "score(number), category(income/health/biz/family), angle(string), pain(string), product_focus(string), approach(string), simulation(string สถานการณ์จำลอง), personality(string วิเคราะห์บุคลิกภาพเชิงลึก)";
          writerSystemPrompt += "message(string), tone(string), hook(string), conversation_example(string บทสนทนาแบบยาวพร้อมมุกคุย), follow_up(string), objection_handling(string วิธีรับมือข้อโต้แย้ง/การปฏิเสธแบบละมุนละม่อม)";
        }

        try {
          setAnalyzeLog(prev => [...prev, '🤖 กำลังรัน Analyse Agent...']);
          const analyseUserPrompt = `วิเคราะห์ข้อมูลผู้มุ่งหวังนี้และประเมินโอกาส จงตอบข้อมูลทุกอย่างเป็นภาษาไทยทั้งหมด:\n\n${context}\n\n*คำแนะนำสินค้า: พิจารณาแนะนำสินค้า Amway ที่ตรงกับความต้องการจริง (เช่น Nutrilite สำหรับสุขภาพ, Artistry สำหรับผิวพรรณ, หรือแผนธุรกิจ CORE Plus สำหรับผู้ที่ต้องการรายได้) ไม่จำเป็นต้องจำกัดอยู่แค่โปรแกรม UP Labs หากไม่ตรงกับปัญหาของเขา แต่ถ้าวิเคราะห์แล้วว่าเขามีปัญหาเรื่องระบบเผาผลาญ/น้ำหนัก/น้ำตาล สามารถแนะนำ UP Labs (3-Day Reset) ได้ตามความเหมาะสม`;
          
          analyseData = await callGemini(analyseUserPrompt, analyseSystemPrompt);
          setAnalyzeLog(prev => [...prev, '✅ วิเคราะห์เสร็จสิ้น', '🤖 กำลังรัน Writer Agent...']);

          const writerUserPrompt = `
ข้อมูลผู้มุ่งหวัง:
${context}

ผลการวิเคราะห์:
มุมเข้าหา: ${analyseData.angle}
Pain point: ${analyseData.pain || 'ไม่มีระบุ'}

จงร่างข้อความทักทายเป็นภาษาไทย ห้ามพูดถึงแอมเวย์โดยตรง ไม่ขาย ไม่กดดัน เน้นสร้างสายสัมพันธ์และเช็คฟอร์ม ${
  analysisLevel === 'deep' ? 'ใช้ความเป็นตัวตนของเขามาสร้างประเด็นชวนคุยหรือมุกตลกเบาๆ' : ''
}`;
          
          writerData = await callGemini(writerUserPrompt, writerSystemPrompt);
          setAnalyzeLog(prev => [...prev, '✅ ร่างข้อความเสร็จสิ้น', '💾 กำลังบันทึกลงฐานข้อมูล...']);

          const updatedLeadData = {
            analyse_score: analyseData.score,
            analyse_category: analyseData.category,
            analyse_angle: analyseData.angle,
            analyse_reason: analyseData.reason || '',
            analyse_pain: analyseData.pain || '',
            analyse_product: analyseData.product_focus || '',
            analyse_approach: analyseData.approach || '',
            analyse_simulation: analyseData.simulation || '',
            analyse_personality: analyseData.personality || '',
            
            writer_message: writerData.message || '',
            writer_tone: writerData.tone || '',
            writer_hook: writerData.hook || '',
            writer_conversation: writerData.conversation_example || '',
            writer_followup: writerData.follow_up || '',
            writer_objection: writerData.objection_handling || '',
            
            analysed_at: new Date().toISOString(),
            updated_at: new Date().toISOString()
          };

          if (supabaseClient) {
            await supabaseClient.from('aw_prospects').update(updatedLeadData).eq('id', selectedLead.id);
            fetchProspects();
          }
          
          setSelectedLead(prev => ({ ...prev, ...updatedLeadData }));
          setAnalyzeLog(prev => [...prev, '🎉 สำเร็จ!']);
          setTimeout(() => setAnalyzing(false), 1500);

        } catch (err) {
          console.error(err);
          setAnalyzeLog(prev => [...prev, `❌ เกิดข้อผิดพลาด: ${err.message}`]);
          setAnalyzing(false);
        }
      };

      const copyToClipboard = (text) => {
        navigator.clipboard.writeText(text);
        alert('คัดลอกข้อความแล้ว');
      };

      const saveSettings = () => {
        localStorage.setItem('supabaseUrl', supabaseUrl);
        localStorage.setItem('supabaseKey', supabaseKey);
        localStorage.setItem('geminiApiKey', geminiApiKey);
        alert('บันทึกการตั้งค่าเรียบร้อยแล้ว ระบบจะรีเฟรชการเชื่อมต่ออัตโนมัติ');
      };

      // --- Renders ---

      const renderSidebar = () => {
        const filtered = prospects.filter(p => 
          p.name.toLowerCase().includes(searchQuery.toLowerCase()) || 
          (p.nickname && p.nickname.toLowerCase().includes(searchQuery.toLowerCase()))
        );

        return (
          <div className="w-[280px] bg-slate-900 border-r border-slate-800 flex flex-col h-full z-10 shrink-0">
            <div className="p-4 border-b border-slate-800">
              <h1 className="text-xl font-bold text-slate-100 flex items-center gap-2 mb-4">
                <i className="ph ph-activity text-blue-500 text-xl"></i> Amway CRM
              </h1>
              <button 
                onClick={() => { setFormData(DEFAULT_PROSPECT); setCurrentView('form'); setSelectedLead(null); setHobbyInput(''); }}
                className="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 px-4 rounded-md flex items-center justify-center gap-2 transition-colors font-medium"
              >
                <i className="ph ph-user-plus text-lg"></i> Add Lead
              </button>
            </div>
            
            <div className="p-4 border-b border-slate-800">
              <div className="relative">
                <i className="ph ph-magnifying-glass absolute left-3 top-3 text-slate-500 text-base"></i>
                <input 
                  type="text" 
                  placeholder="Search prospects..." 
                  value={searchQuery}
                  onChange={e => setSearchQuery(e.target.value)}
                  className="w-full bg-slate-950 border border-slate-800 rounded-md py-2 pl-9 pr-3 text-sm text-slate-200 focus:outline-none focus:border-blue-500 transition-colors"
                />
              </div>
            </div>

            <div className="flex-1 overflow-y-auto p-2 space-y-1 custom-scrollbar">
              {filtered.length === 0 ? (
                <div className="text-center text-slate-500 text-sm py-8">ไม่มีข้อมูลผู้มุ่งหวัง</div>
              ) : (
                filtered.map(p => (
                  <div 
                    key={p.id}
                    onClick={() => { setSelectedLead(p); setCurrentView('detail'); }}
                    className={`p-3 rounded-md cursor-pointer transition-all border ${selectedLead?.id === p.id ? 'bg-slate-800 border-slate-700' : 'border-transparent hover:bg-slate-800/50'}`}
                  >
                    <div className="flex justify-between items-start mb-1">
                      <div className="font-medium text-slate-200 truncate pr-2">
                        {p.gender === 'ชาย' ? '👨' : p.gender === 'หญิง' ? '👩' : '🧑'} {p.name} {p.nickname && `(${p.nickname})`}
                      </div>
                      {p.analyse_score && (
                        <span className={`text-xs px-1.5 py-0.5 rounded font-bold ${getScoreColor(p.analyse_score)}`}>
                          {p.analyse_score}
                        </span>
                      )}
                    </div>
                    <div className="text-xs text-slate-400 truncate mb-2">
                      {p.occupation || 'ไม่ได้ระบุอาชีพ'} • {p.company || '-'}
                    </div>
                    <div className="flex gap-1 flex-wrap">
                      <span className={`text-[10px] px-1.5 py-0.5 rounded-full ${STATUS_COLORS[p.status || 'ยังไม่ได้ทัก']}`}>
                        {p.status || 'ยังไม่ได้ทัก'}
                      </span>
                    </div>
                  </div>
                ))
              )}
            </div>

            <div className="p-4 border-t border-slate-800">
              <button 
                onClick={() => setCurrentView('settings')}
                className="flex items-center gap-2 text-slate-400 hover:text-slate-200 transition-colors w-full text-sm"
              >
                <i className="ph ph-gear text-base"></i> Settings & API
              </button>
            </div>
          </div>
        );
      };

      const renderForm = () => {
        const handleHobbyKeyDown = (e) => {
          if (e.key === 'Enter') {
            e.preventDefault();
            const val = hobbyInput.trim();
            if (val && !formData.hobbies.includes(val)) {
              setFormData({ ...formData, hobbies: [...formData.hobbies, val] });
            }
            setHobbyInput('');
          }
        };

        const removeHobby = (hobby) => {
          setFormData({ ...formData, hobbies: formData.hobbies.filter(h => h !== hobby) });
        };

        const renderInputField = ({ label, name, type = "text", placeholder = "", required = false, isTextarea = false, rows = 3 }) => (
          <div className="flex flex-col gap-1.5 mb-4" key={name}>
            <label className="text-sm font-medium text-slate-300">{label} {required && <span className="text-red-500">*</span>}</label>
            {isTextarea ? (
              <textarea
                value={formData[name] || ''}
                onChange={e => setFormData({...formData, [name]: e.target.value})}
                className="bg-slate-950 border border-slate-700 rounded-md p-2.5 text-slate-200 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all text-sm"
                placeholder={placeholder}
                rows={rows}
              />
            ) : (
              <input
                type={type}
                value={formData[name] || ''}
                onChange={e => setFormData({...formData, [name]: e.target.value})}
                className="bg-slate-950 border border-slate-700 rounded-md p-2.5 text-slate-200 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all text-sm"
                placeholder={placeholder}
                required={required}
              />
            )}
          </div>
        );

        const renderRadioGroupField = ({ label, name, options }) => {
          // Special handling for num_children display if it's stored as number in state
          let currentVal = formData[name];
          if (name === 'num_children' && typeof currentVal === 'number') {
            currentVal = CHILD_MAP[currentVal] || currentVal.toString();
          }

          return (
            <div className="flex flex-col gap-2 mb-4" key={name}>
              <label className="text-sm font-medium text-slate-300">{label}</label>
              <div className="flex flex-wrap gap-2">
                {options.map(opt => (
                  <button
                    key={opt}
                    type="button"
                    onClick={() => setFormData({...formData, [name]: opt})}
                    className={`px-3 py-1.5 text-sm rounded-md border transition-all ${
                      currentVal === opt 
                        ? 'bg-blue-600/20 border-blue-500 text-blue-400' 
                        : 'bg-slate-950 border-slate-700 text-slate-400 hover:border-slate-500'
                    }`}
                  >
                    {opt}
                  </button>
                ))}
              </div>
            </div>
          );
        };

        return (
          <div className="flex-1 overflow-y-auto bg-slate-950 p-6 md:p-8 custom-scrollbar relative">
            <div className="max-w-4xl mx-auto pb-24">
              <div className="flex justify-between items-center mb-6">
                <h2 className="text-2xl font-bold text-slate-100 flex items-center gap-2">

                              <i className="ph ph-pen-nib text-indigo-400 text-base"></i> Suggested Opening
                            </h3>
                            {lead.writer_tone && (
                              <span className="px-2 py-1 bg-indigo-900/50 text-indigo-300 text-xs rounded-full border border-indigo-700/50">
                                Tone: {lead.writer_tone}
                              </span>
                            )}
                          </div>

                          <div className="bg-slate-900 border border-indigo-500/30 rounded-lg p-5 relative group">
                            <p className="text-slate-200 whitespace-pre-wrap leading-relaxed text-sm md:text-base">
                              {lead.writer_message}
                            </p>
                            <button 
                              onClick={() => copyToClipboard(lead.writer_message)}
                              className="absolute top-3 right-3 p-2 bg-slate-800 hover:bg-slate-700 text-slate-400 hover:text-white rounded-md opacity-0 group-hover:opacity-100 transition-all border border-slate-700"
                              title="Copy message"
                            >
                              <i className="ph ph-copy text-base"></i>
                            </button>
                          </div>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                          <div className="bg-slate-900/50 p-3 rounded-lg border border-slate-800">
                            <span className="text-xs font-bold text-indigo-400 uppercase tracking-wider block mb-1">🪝 Hook Strategy</span>
                            <p className="text-sm text-slate-300">{lead.writer_hook}</p>
                          </div>
                          
                          {lead.writer_followup && (
                            <div className="bg-slate-900/50 p-3 rounded-lg border border-slate-800">
                              <span className="text-xs font-bold text-emerald-400 uppercase tracking-wider block mb-1">🔄 Follow-up</span>
                              <p className="text-sm text-slate-300">{lead.writer_followup}</p>
                            </div>
                          )}
                        </div>

                        {lead.writer_conversation && (
                          <div className="bg-slate-900/50 p-4 rounded-lg border border-slate-800 mt-2">
                            <span className="text-xs font-bold text-amber-400 uppercase tracking-wider block mb-2 flex items-center gap-1"><i className="ph ph-chat-circle text-sm"></i> บทสนทนาจำลอง / สคริปต์</span>
                            <p className="text-sm text-slate-300 whitespace-pre-wrap leading-relaxed">{lead.writer_conversation}</p>
                          </div>
                        )}

                        {lead.writer_objection && (
                          <div className="bg-red-950/20 p-4 rounded-lg border border-red-900/30 mt-2">
                            <span className="text-xs font-bold text-red-400 uppercase tracking-wider block mb-2">🛡️ วิธีรับมือข้อโต้แย้ง (Objection Handling)</span>
                            <p className="text-sm text-slate-300 whitespace-pre-wrap leading-relaxed">{lead.writer_objection}</p>
                          </div>
                        )}
                        
                        <div className="mt-2 text-xs text-slate-500 text-right">
                          วิเคราะห์เมื่อ: {new Date(lead.analysed_at).toLocaleString('th-TH')}
                        </div>
                      </div>

                    </div>
                  )}
                </div>
              )}

            </div>
          </div>
        );
      };

      const renderSettings = () => (
        <div className="flex-1 overflow-y-auto bg-slate-950 p-6 md:p-8 custom-scrollbar">
          <div className="max-w-3xl mx-auto space-y-8">
            <div>
              <h2 className="text-2xl font-bold text-slate-100 flex items-center gap-2 mb-2">
                <i className="ph ph-gear text-slate-400"></i> Settings & Connections
              </h2>
              <p className="text-slate-400 text-sm">จัดการการเชื่อมต่อ API และฐานข้อมูลของคุณสำหรับใช้งานบน Github Pages</p>
            </div>

            <div className="bg-slate-900 rounded-xl border border-slate-800 p-6">
              <h3 className="text-lg font-semibold text-slate-200 mb-4 flex items-center gap-2">
                <i className="ph ph-database text-emerald-400 text-lg"></i> Supabase Configuration
              </h3>
              <div className="space-y-4">
                <div className="flex flex-col gap-1.5">
                  <label className="text-sm font-medium text-slate-300">Supabase Project URL</label>
                  <input 
                    type="text"
                    value={supabaseUrl}
                    onChange={(e) => setSupabaseUrl(e.target.value)}
                    placeholder="https://xxxx.supabase.co"
                    className="bg-slate-950 border border-slate-700 rounded-md p-2.5 text-slate-200 focus:outline-none focus:border-indigo-500"
                  />
                </div>
                <div className="flex flex-col gap-1.5">
                  <label className="text-sm font-medium text-slate-300">Supabase Anon Key</label>
                  <input 
                    type="password"
                    value={supabaseKey}
                    onChange={(e) => setSupabaseKey(e.target.value)}
                    placeholder="eyJhbG..."
                    className="bg-slate-950 border border-slate-700 rounded-md p-2.5 text-slate-200 focus:outline-none focus:border-indigo-500"
                  />
                </div>
              </div>
            </div>

            <div className="bg-slate-900 rounded-xl border border-slate-800 p-6">
              <h3 className="text-lg font-semibold text-slate-200 mb-4 flex items-center gap-2">
                <i className="ph ph-brain text-indigo-400 text-lg"></i> Google Gemini API Key
              </h3>
              <div className="flex flex-col gap-1.5">
                <label className="text-sm font-medium text-slate-300">Gemini API Key</label>
                <input 
                  type="password"
                  value={geminiApiKey}
                  onChange={(e) => setGeminiApiKey(e.target.value)}
                  placeholder="AIzaSy..."
                  className="bg-slate-950 border border-slate-700 rounded-md p-2.5 text-slate-200 focus:outline-none focus:border-indigo-500"
                />
              </div>
            </div>

            <div className="flex justify-end">
              <button 
                onClick={saveSettings}
                className="px-6 py-2.5 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-lg shadow-lg shadow-blue-900/20 transition-all flex items-center gap-2"
              >
                <i className="ph ph-floppy-disk text-lg"></i> Save Configurations
              </button>
            </div>

            <div className="bg-slate-900 rounded-xl border border-slate-800 p-6 opacity-75">
              <h3 className="text-lg font-semibold text-slate-200 mb-4 flex items-center gap-2">
                <i className="ph ph-code text-slate-400 text-lg"></i> Database Schema (SQL)
              </h3>
              <p className="text-sm text-slate-400 mb-4">
                รันคำสั่งนี้ในหน้า SQL Editor ของ Supabase ก่อนเริ่มใช้งาน
              </p>
              <div className="relative group">
                <pre id="sql-schema" className="bg-slate-950 border border-slate-800 rounded-lg p-4 text-xs text-blue-300 overflow-x-auto font-mono">
CREATE TABLE aw_prospects (
  id uuid DEFAULT gen_random_uuid() PRIMARY KEY,
  created_at timestamptz DEFAULT now(),
  updated_at timestamptz DEFAULT now(),
  name text NOT NULL,
  nickname text,
  age integer,
  gender text,
  facebook_url text,
  status text DEFAULT 'ยังไม่ได้ทัก',
  family_status text,
  family_obligations text,
  num_children integer DEFAULT 0,
  family_notes text,
  occupation text,
  company text,
  income_level text,
  job_satisfaction text,
  financial_notes text,
  hobbies text[],
  activities text,
  lifestyle text,
  social_media_style text,
  relationship text,
  how_we_met text,
  extra_notes text,
  analyse_score integer,
  analyse_category text,
  analyse_angle text,
  analyse_reason text,
  analyse_pain text,
  analyse_product text,
  analyse_approach text,
  analyse_simulation text,
  analyse_personality text,
  writer_message text,
  writer_tone text,
  writer_hook text,
  writer_conversation text,
  writer_followup text,
  writer_objection text,
  analysed_at timestamptz
);

ALTER TABLE aw_prospects ENABLE ROW LEVEL SECURITY;
CREATE POLICY "allow_all" ON aw_prospects FOR ALL USING (true);</pre>
                <button 
                  onClick={() => copyToClipboard(document.getElementById('sql-schema').innerText)}
                  className="absolute top-3 right-3 p-2 bg-slate-800 hover:bg-slate-700 text-slate-400 hover:text-white rounded-md opacity-0 group-hover:opacity-100 transition-all border border-slate-700"
                >
                  <i className="ph ph-copy"></i>
                </button>
              </div>
            </div>
          </div>
        </div>
      );

      return (
        <div className="flex h-screen bg-slate-950 text-slate-200 font-sans overflow-hidden">
          {renderSidebar()}
          
          <main className="flex-1 flex flex-col overflow-hidden relative">
            {currentView === 'list' && (
              <div className="flex-1 flex flex-col items-center justify-center text-slate-500 bg-slate-950 p-6">
                <div className="w-24 h-24 mb-6 rounded-full bg-slate-900 border border-slate-800 flex items-center justify-center shadow-inner">
                  <i className="ph ph-users text-[40px] text-slate-600"></i>
                </div>
                <h2 className="text-xl font-medium text-slate-300 mb-2">ยังไม่ได้เลือกผู้มุ่งหวัง</h2>
                <p className="text-sm text-center max-w-sm">
                  เลือกผู้มุ่งหวังจากแถบด้านซ้ายเพื่อดูรายละเอียด หรือคลิก "+ Add Lead" เพื่อเพิ่มผู้มุ่งหวังใหม่เข้าระบบ
                </p>
                {(!supabaseUrl || !supabaseKey) && (
                  <button onClick={() => setCurrentView('settings')} className="mt-6 px-4 py-2 bg-indigo-600 text-white rounded-md text-sm shadow-lg hover:bg-indigo-700 transition">
                    ไปตั้งค่าการเชื่อมต่อฐานข้อมูล
                  </button>
                )}
              </div>
            )}
            {currentView === 'form' && renderForm()}
            {currentView === 'detail' && renderDetail()}
            {currentView === 'settings' && renderSettings()}
          </main>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
