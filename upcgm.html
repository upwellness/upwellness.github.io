    // --- Helper Functions ---
    const parseDateString = (dateStr) => new Date(dateStr.replace(' ', 'T'));
    const formatTime = (date) => date.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
    const formatDate = (date) => date.toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: 'numeric' });
    const formatDateTime = (date) => `${formatDate(date)} ${formatTime(date)}`;
    const getLocalDateString = (date) => {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const day = String(date.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    };
    const chunkArray = (array, size) => {
      const chunks = [];
      for (let i = 0; i < array.length; i += size) chunks.push(array.slice(i, i + size));
      return chunks;
    };

    // Retry fetch helper for Gemini API
    const fetchWithRetry = async (url, options, retries = 5) => {
      let delay = 1000;
      for (let i = 0; i < retries; i++) {
        try {
          const response = await fetch(url, options);
          if (!response.ok) {
            const errData = await response.json().catch(() => null);
            throw new Error(errData?.error?.message || `HTTP error! status: ${response.status}`);
          }
          return await response.json();
        } catch (error) {
          if (i === retries - 1) throw error;
          await new Promise(res => setTimeout(res, delay));
          delay *= 2;
        }
      }
    };

    const RANGE_OPTIONS = [
      { label: '4 ชั่วโมง', hours: 4 },
      { label: '8 ชั่วโมง', hours: 8 },
      { label: '12 ชั่วโมง', hours: 12 },
      { label: '24 ชั่วโมง', hours: 24 },
      { label: '3 วัน', hours: 72 },
      { label: '7 วัน', hours: 168 },
      { label: '14 วัน', hours: 336 },
    ];

    // --- Main Component ---
    function App() {
      const [availableProfiles, setAvailableProfiles] = useState([]);
      const [allData, setAllData] = useState([]);
      const [allMeals, setAllMeals] = useState([]);
      
      const [selectedProfile, setSelectedProfile] = useState('');
      const [dropdownProfile, setDropdownProfile] = useState('');
      const [newProfileName, setNewProfileName] = useState('');
      
      // Tabs: 'dashboard' | 'analyzer'
      const [activeTab, setActiveTab] = useState('dashboard');

      // Refresh Trigger to re-fetch data after mutation
      const [refreshTrigger, setRefreshTrigger] = useState(0);
      
      // Time Filtering State
      const [anchorDateStr, setAnchorDateStr] = useState('');
      const [timeRangeHours, setTimeRangeHours] = useState(24);
      
      const [isUploading, setIsUploading] = useState(false);
      const [uploadProgress, setUploadProgress] = useState(0);
      
      // Settings / API Key State
      const [userApiKey, setUserApiKey] = useState(() => localStorage.getItem('gemini_api_key') || '');
      const [showSettingsModal, setShowSettingsModal] = useState(false);
      const [tempApiKey, setTempApiKey] = useState('');
      
      // Meal Form State
      const [editingMealId, setEditingMealId] = useState(null);
      const [newMealTime, setNewMealTime] = useState('');
      const [newMealDesc, setNewMealDesc] = useState('');
      const [newMealCarbs, setNewMealCarbs] = useState('');
      const [newMealProtein, setNewMealProtein] = useState('');
      const [newMealFat, setNewMealFat] = useState('');
      const [isAnalyzingAI, setIsAnalyzingAI] = useState(false);

      // Comparison Feature State
      const [compareIds, setCompareIds] = useState([]);
      const [showCompareModal, setShowCompareModal] = useState(false);
      const [isSavingImage, setIsSavingImage] = useState(false);
      const compareContainerRef = useRef(null);
      const COMPARE_COLORS = ['#14b8a6', '#f43f5e', '#8b5cf6', '#f59e0b']; // Teal, Rose, Violet, Amber

      // AI Comparison State
      const [compareAiResult, setCompareAiResult] = useState(null);
      const [isAnalyzingCompareAi, setIsAnalyzingCompareAi] = useState(false);

      // Save API Key Function
      const handleSaveApiKey = () => {
        const keyToSave = tempApiKey.trim();
        setUserApiKey(keyToSave);
        localStorage.setItem('gemini_api_key', keyToSave);
        setShowSettingsModal(false);
      };

      // 1. Fetch available profiles on mount
      useEffect(() => {
        if (!supabase) return;
        const fetchProfiles = async () => {
          let allProfiles = new Set();
          let hasMore = true;
          let start = 0;
          const step = 1000; 

          try {
            while (hasMore) {
              const { data, error } = await supabase.from('cgm_readings').select('profile_name').range(start, start + step - 1);
              if (error) throw error;
              if (!data || data.length === 0) break;
              data.forEach(d => { if (d.profile_name) allProfiles.add(d.profile_name); });
              if (data.length < step) hasMore = false; else start += step;
            }
            setAvailableProfiles([...allProfiles].sort());
          } catch (err) { console.error("Error fetching profiles:", err); }
        };
        fetchProfiles();
      }, [refreshTrigger]);

      // 2. Fetch Data for Selected Profile
      useEffect(() => {
        if (!selectedProfile || !supabase) return;
        
        const loadData = async () => {
          try {
            let allReadings = [];
            let hasMore = true;
            let start = 0;
            const step = 1000;

            while (hasMore) {
              const { data, error } = await supabase
                .from('cgm_readings').select('*')
                .eq('profile_name', selectedProfile).order('reading_timestamp', { ascending: true })
                .range(start, start + step - 1);
                
              if (error) throw error;
              if (!data || data.length === 0) break;
              allReadings = [...allReadings, ...data];
              if (data.length < step) hasMore = false; else start += step;
            }

            const resMeals = await supabase
               .from('cgm_meals').select('*')
               .eq('profile_name', selectedProfile).order('meal_timestamp', { ascending: true });

            if (resMeals.error) throw resMeals.error;

            const mappedData = allReadings.map(d => ({
              profile: d.profile_name, originalTime: d.original_time,
              timestamp: Number(d.reading_timestamp), dateStr: d.date_str,
              glucose: d.glucose, time: new Date(Number(d.reading_timestamp))
            }));
            
            const mappedMeals = (resMeals.data || []).map(m => ({
              id: m.id, profile: m.profile_name,
              timestamp: Number(m.meal_timestamp), dateStr: m.date_str,
              description: m.description, 
              carbs: m.carbs, protein: m.protein, fat: m.fat, 
              time: new Date(Number(m.meal_timestamp))
            }));

            setAllData(mappedData);
            setAllMeals(mappedMeals);
          } catch (err) {
            console.error("Error loading Supabase data:", err);
            alert("เกิดข้อผิดพลาดในการโหลดข้อมูล กรุณาตรวจสอบ Console");
          }
        };
        loadData();
      }, [selectedProfile, refreshTrigger]);

      const uniqueDays = useMemo(() => {
        const days = allData.map(d => d.dateStr);
        return [...new Set(days)].sort((a, b) => new Date(b) - new Date(a));
      }, [allData]);

      useEffect(() => {
        if (uniqueDays.length > 0 && (!anchorDateStr || !uniqueDays.includes(anchorDateStr))) {
          setAnchorDateStr(uniqueDays[0]);
        }
      }, [uniqueDays, anchorDateStr]);

      const { startTimestamp, endTimestamp } = useMemo(() => {
        if (!anchorDateStr || allData.length === 0) return { startTimestamp: 0, endTimestamp: 0 };
        const dataInDay = allData.filter(d => d.dateStr === anchorDateStr);
        let maxTs = 0;
        if (dataInDay.length > 0) { maxTs = Math.max(...dataInDay.map(d => d.timestamp)); } 
        else { maxTs = new Date(`${anchorDateStr}T23:59:59`).getTime(); }
        const startTs = maxTs - (timeRangeHours * 60 * 60 * 1000);
        return { startTimestamp: startTs, endTimestamp: maxTs };
      }, [anchorDateStr, timeRangeHours, allData]);

      const currentRangeData = useMemo(() => {
        if (allData.length === 0 || startTimestamp === 0) return [];
        return allData.filter(d => d.timestamp > startTimestamp && d.timestamp <= endTimestamp);
      }, [allData, startTimestamp, endTimestamp]);

      const rangeStats = useMemo(() => {
        if (currentRangeData.length === 0) return null;
        let sum = 0, optimal = 0, acceptable = 0, low = 0;
        currentRangeData.forEach(d => {
          sum += d.glucose;
          if (d.glucose < 70) low++;
          else if (d.glucose <= 110) optimal++;
          else if (d.glucose <= 140) acceptable++;
        });
        const total = currentRangeData.length;
        const mean = sum / total;
        let sumSqDiff = 0;
        currentRangeData.forEach(d => { sumSqDiff += Math.pow(d.glucose - mean, 2); });
        const sd = Math.sqrt(sumSqDiff / total);
        const cv = (sd / mean) * 100;
        
        const eA1c = ((mean + 46.7) / 28.7).toFixed(1);

        return {
          avg: Math.round(mean), optimalPct: Math.round((optimal / total) * 100),
          acceptablePct: Math.round((acceptable / total) * 100), lowPct: Math.round((low / total) * 100),
          min: Math.min(...currentRangeData.map(d => d.glucose)),
          max: Math.max(...currentRangeData.map(d => d.glucose)),
          cv: cv.toFixed(1), eA1c: Number(eA1c)
        };
      }, [currentRangeData]);

      const handleFileUpload = (event) => {
        if (!selectedProfile || !supabase) return;
        const file = event.target.files[0];
        if (!file) return;

        setIsUploading(true);
        setUploadProgress(0);

        const reader = new FileReader();
        reader.onload = async (e) => {
          const lines = e.target.result.trim().split('\n');
          const parsedData = lines.slice(1).map(line => {
            const [timeStr, glucStr] = line.split(',');
            if (!timeStr || !glucStr) return null;
            const timeObj = parseDateString(timeStr);
            if (isNaN(timeObj.getTime())) return null;
            return {
              profile_name: selectedProfile, original_time: timeStr,
              reading_timestamp: timeObj.getTime(), date_str: getLocalDateString(timeObj),
              glucose: parseFloat(glucStr)
            };
          }).filter(d => d && !isNaN(d.glucose));

          const chunks = chunkArray(parsedData, 500);
          let processed = 0;
          try {
            for (const chunk of chunks) {
              const { error } = await supabase.from('cgm_readings').upsert(chunk, { onConflict: 'profile_name, reading_timestamp' });
              if (error) throw error;
              processed += chunk.length;
              setUploadProgress(Math.round((processed / parsedData.length) * 100));
            }
          } catch (err) {
            console.error("Upload error:", err); alert("เกิดข้อผิดพลาดในการอัปโหลด: " + err.message);
          } finally {
            setIsUploading(false); setRefreshTrigger(prev => prev + 1); event.target.value = '';
          }
        };
        reader.readAsText(file);
      };

      // --- AI API Call for Macros ---
      const handleAnalyzeAI = async () => {
        if (!userApiKey) {
          alert("กรุณาตั้งค่า Gemini API Key ก่อนใช้งาน AI (คลิกที่ไอคอนฟันเฟืองมุมขวาบน)");
          return;
        }
        if (!newMealDesc) {
          alert("กรุณาพิมพ์รายละเอียดมื้ออาหารก่อนครับ เช่น 'ข้าวมันไก่ 1 จาน'");
          return;
        }
        setIsAnalyzingAI(true);
        try {
          const apiKey = userApiKey.trim();
          const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
          
          const payload = {
            contents: [{ parts: [{ text: `วิเคราะห์สารอาหาร (คาร์โบไฮเดรต, โปรตีน, ไขมัน) เป็นหน่วยกรัม (g) สำหรับมื้ออาหารนี้: "${newMealDesc}" หากไม่มีการระบุปริมาณ ให้ประเมินจาก 1 จาน/เสิร์ฟมาตรฐานทั่วไป` }] }],
            systemInstruction: { parts: [{ text: "คุณคือนักกำหนดอาหาร ประเมินค่าสารอาหารคร่าวๆ (เป็นตัวเลขกรัม) จากชื่ออาหารที่ผู้ใช้ระบุ คืนค่าเป็น JSON" }] },
            generationConfig: {
              responseMimeType: "application/json",
              responseSchema: {
                type: "OBJECT",
                properties: {
                  carbs: { type: "INTEGER", description: "Carbohydrates in grams" },
                  protein: { type: "INTEGER", description: "Protein in grams" },
                  fat: { type: "INTEGER", description: "Fat in grams" }
                },
                required: ["carbs", "protein", "fat"]
              }
            }
          };

          const responseData = await fetchWithRetry(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });

          const textResponse = responseData.candidates?.[0]?.content?.parts?.[0]?.text;
          if (textResponse) {
            const macros = JSON.parse(textResponse);
            setNewMealCarbs(macros.carbs || 0);
            setNewMealProtein(macros.protein || 0);
            setNewMealFat(macros.fat || 0);
          }
        } catch (err) {
          console.error("AI Analysis failed:", err);
          alert(`ไม่สามารถวิเคราะห์ด้วย AI ได้ โปรดตรวจสอบ API Key ของคุณ\n(Error: ${err.message})`);
        } finally {
          setIsAnalyzingAI(false);
        }
      };

      // --- Save or Update Meal ---
      const handleSaveMeal = async (e) => {
        e.preventDefault();
        if (!newMealTime || !selectedProfile || !supabase) return;
        const mealDateTime = new Date(`${anchorDateStr}T${newMealTime}`);
        const timestamp = mealDateTime.getTime();
        
        const mealData = { 
          profile_name: selectedProfile, 
          meal_timestamp: timestamp, 
          date_str: anchorDateStr, 
          description: newMealDesc || 'มื้ออาหาร',
          carbs: newMealCarbs !== '' ? Number(newMealCarbs) : null,
          protein: newMealProtein !== '' ? Number(newMealProtein) : null,
          fat: newMealFat !== '' ? Number(newMealFat) : null
        };

        try {
          if (editingMealId) {
            const { error } = await supabase.from('cgm_meals').update(mealData).eq('id', editingMealId);
            if (error) throw error;
          } else {
            const { error } = await supabase.from('cgm_meals').insert([mealData]);
            if (error) throw error;
          }
          // Reset Form
          cancelEdit();
          setRefreshTrigger(prev => prev + 1);
        } catch (err) {
          console.error("Save meal error:", err); 
          alert("ไม่สามารถบันทึก/อัปเดตมื้ออาหารได้: " + err.message);
        }
      };

      const handleEditMealClick = (meal) => {
        setEditingMealId(meal.id);
        setAnchorDateStr(meal.dateStr);
        const d = new Date(meal.timestamp);
        const hours = String(d.getHours()).padStart(2, '0');
        const mins = String(d.getMinutes()).padStart(2, '0');
        setNewMealTime(`${hours}:${mins}`);
        setNewMealDesc(meal.description || '');
        setNewMealCarbs(meal.carbs !== null && meal.carbs !== undefined ? meal.carbs : '');
        setNewMealProtein(meal.protein !== null && meal.protein !== undefined ? meal.protein : '');
        setNewMealFat(meal.fat !== null && meal.fat !== undefined ? meal.fat : '');
        
        // Scroll to top where the form usually is

      const cancelEdit = () => {

        setNewMealTime('');

      const removeMeal = async (id) => {
        if (!supabase) return;

      const getGlucoseAtTime = (targetTs, toleranceMs = 15 * 60000) => {
        const windowData = allData.filter(d => Math.abs(d.timestamp - targetTs) <= toleranceMs);
        if (windowData.length === 0) return null;
        let closest = windowData[0];
        let minDiff = Math.abs(windowData[0].timestamp - targetTs);
        windowData.forEach(d => {
          const diff = Math.abs(d.timestamp - targetTs);
          if (diff < minDiff) { minDiff = diff; closest = d; }
        });
        return closest.glucose;
      };

      const fullyAnalyzedMeals = useMemo(() => {
        return allMeals.map(meal => {
          const beforeMealData = allData.filter(d => d.timestamp <= meal.timestamp);
          const baseline = beforeMealData.length > 0 ? beforeMealData[beforeMealData.length - 1].glucose : null;
          const windowEnd = meal.timestamp + (3 * 60 * 60 * 1000);
          const windowData = allData.filter(d => d.timestamp >= meal.timestamp && d.timestamp <= windowEnd);
          
          if (windowData.length === 0 || !baseline) return { ...meal, baseline: null, peakGlucose: null, delta: null, valid: false };

          let peakData = windowData[0];
          windowData.forEach(d => { if (d.glucose > peakData.glucose) peakData = d; });
          const lagMins = Math.round((peakData.timestamp - meal.timestamp) / 60000);
          const delta = peakData.glucose - baseline;

          const hr1 = getGlucoseAtTime(meal.timestamp + 1 * 3600000);
          const hr2 = getGlucoseAtTime(meal.timestamp + 2 * 3600000);
          const hr3 = getGlucoseAtTime(meal.timestamp + 3 * 3600000);

          let score = 100;
          if (delta > 30) score -= (delta - 30); 
          if (lagMins > 60) score -= 10; 
          if (hr2 && hr2 > baseline + 20) score -= 15; 
          if (hr3 && hr3 > baseline + 10) score -= 15; 
          
          score = Math.max(0, Math.min(100, Math.round(score)));
          let grade = 'C';
          if (score >= 85) grade = 'A';
          else if (score >= 60) grade = 'B';

          let insights = [];
          let curveShape = "";
          let isFastFall = (hr2 && hr2 <= baseline + 15);
          let isFastRise = (lagMins <= 50);

          if (isFastRise && isFastFall) curveShape = "FastRiseFall";
          else if (isFastRise && !isFastFall) curveShape = "FastRiseSlowFall";
          else if (!isFastRise && !isFastFall) curveShape = "SlowRiseSlowFall";
          else curveShape = "Steady";

          if (curveShape === "FastRiseFall") {
            if (delta <= 35) {
              insights.push({ type: 'success', title: 'ขึ้นเร็ว ลงเร็ว (Metabolic Flexible)', text: 'ยอดเยี่ยม! ร่างกายไวต่ออินซูลิน เก็บน้ำตาลได้เร็ว ไม่บล็อกการเผาผลาญไขมันนาน' });
            } else {
              insights.push({ type: 'warning', title: 'ขึ้นสูง ลงเร็วมาก (Spike & Crash)', text: 'น้ำตาลพุ่งแรง อินซูลินจึงหลั่งมาปราบหนัก อาจทำให้เกิดอาการหิวโหย (Reactive Hypoglycemia) ในเวลาต่อมา' });
            }
          } else if (curveShape === "FastRiseSlowFall" || curveShape === "SlowRiseSlowFall") {
            insights.push({ type: 'danger', title: 'ขึ้นสูง ลงช้า (Insulin Load)', text: 'ตับอ่อนทำงานหนัก อินซูลินค้างในกระแสเลือดนาน ทำให้เกิด Randle Effect (ร่างกายไม่ยอมเผาผลาญไขมัน)' });
          }

          let need3Hr = false;
          let timeInsight = "";
          if ((meal.fat && meal.fat > 15) || (meal.protein && meal.protein > 30) || lagMins >= 65) {
            need3Hr = true;
            timeInsight = "ควรดูผลที่ 3 ชม.: มื้อนี้มีไขมัน/โปรตีนสูง ทำให้ย่อยช้า (Delayed Gastric Emptying) อาจเกิดคลื่นน้ำตาลลูกที่สอง (Pizza Effect)";
          } else {
            timeInsight = "ดูแค่ 2 ชม. พอ: คาร์บย่อยไว ไม่มีไขมันมาขวาง อินซูลินน่าจะจัดการจบภายใน 2 ชั่วโมง";
          }
          insights.push({ type: 'info', title: 'ระยะเวลาติดตาม', text: timeInsight });

          return {
            ...meal, valid: true, baseline, peakGlucose: peakData.glucose,
            peakTime: new Date(peakData.timestamp), lagMins, delta, hr1, hr2, hr3,
            score, grade, insights, need3Hr,
            windowData: windowData.map(d => ({ relativeMin: Math.round((d.timestamp - meal.timestamp) / 60000), glucose: d.glucose }))
          };
        }).filter(m => m.valid).sort((a,b) => b.timestamp - a.timestamp);
      }, [allMeals, allData]);

      const analyzedMealsForDashboard = useMemo(() => {
        return fullyAnalyzedMeals.filter(m => m.timestamp >= startTimestamp && m.timestamp <= endTimestamp);
      }, [fullyAnalyzedMeals, startTimestamp, endTimestamp]);

      // Reset AI comparison result when changing selected meals
      useEffect(() => {
        setCompareAiResult(null);
      }, [compareIds]);

      const toggleCompare = (id) => {
        setCompareIds(prev => {
          if (prev.includes(id)) return prev.filter(x => x !== id);
          if (prev.length >= 4) {
            alert("สามารถเลือกเปรียบเทียบได้สูงสุด 4 มื้ออาหารพร้อมกันครับ");
            return prev;
          }
          return [...prev, id];
        });
      };

      const selectedCompareMeals = useMemo(() => {
        return fullyAnalyzedMeals.filter(m => compareIds.includes(m.id));
      }, [compareIds, fullyAnalyzedMeals]);

      const comparisonChartData = useMemo(() => {
        if (selectedCompareMeals.length === 0) return [];
        const data = [];
        for (let min = 0; min <= 180; min += 5) {
          let point = { minute: min };
          selectedCompareMeals.forEach(meal => {
            const reading = meal.windowData.find(d => Math.abs(d.relativeMin - min) <= 2.5);
            point[`meal_${meal.id}`] = reading ? reading.glucose : null;
          });
          data.push(point);
        }
        return data;
      }, [selectedCompareMeals]);

      // --- AI Comparison Generator ---
      const handleGenerateCompareAI = async () => {
        if (!userApiKey) {
          alert("กรุณาตั้งค่า Gemini API Key ก่อนใช้งาน AI (คลิกที่ไอคอนฟันเฟืองมุมขวาบน)");
          return;
        }
        if (selectedCompareMeals.length < 2) {
          alert("ต้องเลือกเปรียบเทียบอย่างน้อย 2 มื้ออาหารครับ");
          return;
        }

        setIsAnalyzingCompareAi(true);
        try {
          const mealsDataText = selectedCompareMeals.map(m => `
          - เมนู: ${m.description}

          - ระดับน้ำตาลก่อนกิน (Baseline): ${m.baseline} mg/dL
          - จุดสูงสุด (Peak): ${m.peakGlucose} mg/dL (เพิ่มขึ้น ${Math.round(m.delta)} mg/dL)
          - ระยะเวลาที่ใช้ถึงจุด Peak (Lag Time): ${m.lagMins} นาที
          - ระดับน้ำตาลที่ 1 ชม.: ${m.hr1 || 'ไม่มีข้อมูล'}
          - ระดับน้ำตาลที่ 2 ชม.: ${m.hr2 || 'ไม่มีข้อมูล'}
          - ระดับน้ำตาลที่ 3 ชม.: ${m.hr3 || 'ไม่มีข้อมูล'}
          `).join('\n');

          const apiKey = userApiKey.trim();
          const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
          
          const payload = {
            contents: [{ parts: [{ text: `วิเคราะห์มื้ออาหารเหล่านี้ตามหลักการของ UP Labs:\n${mealsDataText}` }] }],
            systemInstruction: { parts: [{ text: `คุณคือผู้เชี่ยวชาญระดับสูงจาก UP Labs เชี่ยวชาญเรื่อง Metabolic Flexibility หน้าที่ของคุณคือเปรียบเทียบมื้ออาหารที่ให้มาอย่างละเอียด หลักการวิเคราะห์ของคุณคือ:
1. การลดการหลั่งอินซูลินเป็นหัวใจสำคัญ น้ำตาลยิ่งเด้งน้อย ยิ่งฟื้นตัวเร็ว (ต่ำกว่า 2 ชม.) ถือว่าสุดยอด
2. เตือนเรื่อง Randle Effect หากน้ำตาลค้างสูงเป็นเวลานานร่วมกับการมีไขมันในมื้ออาหาร (ไขมัน+คาร์บ) ซึ่งทำให้ร่างกายเบรกการเผาผลาญไขมัน
3. วิเคราะห์ Pizza Effect หาก Lag Time ช้า หรือน้ำตาลไปเด้งในชั่วโมงที่ 2-3 เนื่องจากไขมันและโปรตีนหน่วงการย่อย
4. อธิบายว่าทำไมมื้อนึงถึงชนะอีกมื้ออย่างชัดเจน เป็นวิทยาศาสตร์แต่อ่านง่าย ใช้ภาษาไทยที่ดูเป็นมืออาชีพแต่เป็นกันเอง
ส่งคำตอบกลับมาในรูปแบบ JSON ตาม Schema ที่กำหนดเท่านั้น ห้ามพิมพ์ text นอก JSON` }] },
            generationConfig: {
              responseMimeType: "application/json",
              responseSchema: {
                type: "OBJECT",
                properties: {
                  winnerTitle: { type: "STRING", description: "ชื่อมื้ออาหารที่ชนะ หรือมื้อที่ดีที่สุด" },
                  winnerReason: { type: "STRING", description: "เหตุผลหลักที่ชนะ อธิบายเรื่องอินซูลินและการเผาผลาญ" },
                  points: {
                    type: "ARRAY",
                    items: {
                      type: "OBJECT",
                      properties: {
                        title: { type: "STRING", description: "หัวข้อการเปรียบเทียบ เช่น 'การเกิด Randle Effect' หรือ 'การดีดตัวของน้ำตาล'" },
                        text: { type: "STRING", description: "คำอธิบายเปรียบเทียบเชิงลึกอย่างละเอียด" },
                        colorType: { type: "STRING", description: "เลือกจาก: emerald (เรื่องดีมาก), amber (เตือน/ปานกลาง), rose (อันตราย/ควรเลี่ยง), indigo (ข้อมูลทั่วไป/Lag Time)" },
                        iconType: { type: "STRING", description: "เลือกจาก: check (ดี), alert (เตือน/อันตราย), trendingUp (ดีดขึ้น), trendingDown (ค้างนาน/ลงช้า), clock (เรื่องเวลา/ย่อยช้า)" }
                      }
                    }
                  },
                  summary: { type: "STRING", description: "บทสรุปและคำแนะนำสั้นๆ สำหรับการปรับพฤติกรรมครั้งต่อไป" }
                },
                required: ["winnerTitle", "winnerReason", "points", "summary"]
              }
            }
          };

          const responseData = await fetchWithRetry(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });

          const textResponse = responseData.candidates?.[0]?.content?.parts?.[0]?.text;
          if (textResponse) {
            setCompareAiResult(JSON.parse(textResponse));
          }
        } catch (err) {
          console.error("AI Compare Analysis failed:", err);
          alert(`ไม่สามารถสร้างบทวิเคราะห์จาก AI ได้ โปรดตรวจสอบ API Key ของคุณ\n(Error: ${err.message})`);
        } finally {
          setIsAnalyzingCompareAi(false);
        }
      };

      // --- Save Image Helper ---
      const handleSaveImage = async () => {
        if (!compareContainerRef.current) return;
        setIsSavingImage(true);
        try {
          const canvas = await window.html2canvas(compareContainerRef.current, {
            scale: 2, // เพิ่มความละเอียดภาพ
            useCORS: true,
            backgroundColor: '#f8fafc' // สีพื้นหลังอิงตาม Tailwind slate-50
          });
          const image = canvas.toDataURL("image/png");
          const link = document.createElement('a');
          link.href = image;
          link.download = `UP_Labs_Metabolic_Compare_${formatDate(new Date()).replace(/\s/g, '-')}.png`;
          link.click();
        } catch (err) {
          console.error("Failed to save image", err);
          alert("เกิดข้อผิดพลาดในการบันทึกภาพ กรุณาลองใหม่อีกครั้ง");
        } finally {
          setIsSavingImage(false);
        }
      };

      if (!window.Recharts) return <div className="p-10 text-center text-rose-500 font-bold">ไม่สามารถโหลดไลบรารี Recharts ได้ กรุณารีเฟรชหน้าเว็บอีกครั้ง</div>;
      
      if (!isSupabaseConfigured) {
        return (
          <div className="min-h-screen bg-slate-50 flex items-center justify-center p-6">
             <div className="bg-white p-10 rounded-3xl shadow-xl max-w-lg w-full text-center border border-slate-100">

                              </div>
                              <div className="flex justify-between text-sm border-b border-slate-50 pb-1">
                                <span className="text-slate-500">ฟื้นตัว 3 ชม. (+3h)</span>
                                <span className={`font-semibold ${meal.hr3 && meal.baseline && meal.hr3 > meal.baseline + 10 ? 'text-rose-500' : 'text-emerald-600'}`}>
                                  {meal.hr3 || '-'}
                                </span>
                              </div>
                            </div>

                            <div className="bg-slate-50 p-3 rounded-xl border border-slate-100 flex flex-col gap-2">
                              <div className="text-[11px] font-bold text-indigo-700 border-b border-slate-200 pb-1 flex items-center gap-1">
                                <IconLeaf size={12} /> ข้อมูลเบื้องต้น
                              </div>
                              {meal.insights.map((insight, i) => (
                                <div key={i} className="text-[11px] leading-relaxed text-slate-600">
                                  <strong>{insight.title}:</strong> {insight.text}
                                </div>
                              ))}
                              {meal.insights.length === 0 && <span className="text-[11px] text-slate-400 italic">ไม่มีข้อมูลความผิดปกติ</span>}
                            </div>
                            
                          </div>
                        ))}
                      </div>

                    </div>
                  </div>
                </div>
              </div>
            )}

            {/* --- Settings Modal --- */}
            {showSettingsModal && (
              <div className="fixed inset-0 z-50 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center p-4 animate-in fade-in duration-200">
                <div className="bg-white w-full max-w-md rounded-3xl shadow-xl border border-slate-200 p-6">
                  <div className="flex justify-between items-center mb-6">
                    <h2 className="text-xl font-bold text-slate-800 flex items-center gap-2">
                      <IconSettings className="text-teal-500" /> ตั้งค่าระบบ AI
                    </h2>
                    <button onClick={() => setShowSettingsModal(false)} className="text-slate-400 hover:text-slate-700 hover:bg-slate-100 p-2 rounded-full transition-colors">
                      <IconX size={20} />
                    </button>
                  </div>
                  
                  <div className="space-y-4">
                    <div>
                      <label className="block text-sm font-medium text-slate-700 mb-1">Gemini API Key</label>
                      <input 
                        type="text" 
                        placeholder="วาง API Key ของคุณที่นี่..." 
                        value={tempApiKey} 
                        onChange={(e) => setTempApiKey(e.target.value)} 
                        className="w-full px-4 py-3 rounded-xl border border-slate-300 focus:outline-none focus:border-teal-500 focus:ring-1 focus:ring-teal-500 bg-slate-50"
                      />
                      <p className="text-xs text-slate-500 mt-2 leading-relaxed">
                        API Key นี้ใช้สำหรับประเมินสัดส่วน C:P:F และเขียนบทวิเคราะห์เชิงลึก<br/>
                        รับคีย์ได้ฟรีที่ <a href="https://aistudio.google.com/app/apikey" target="_blank" rel="noreferrer" className="text-teal-600 hover:underline">Google AI Studio</a> (ระบบจะจำคีย์ไว้ในเบราว์เซอร์ของคุณเท่านั้น ปลอดภัย 100%)
                      </p>
                    </div>
                    
                    <button 
                      onClick={handleSaveApiKey} 
                      className="w-full bg-teal-500 hover:bg-teal-600 text-white font-bold py-3 rounded-xl shadow-sm transition-colors mt-2"
                    >
                      บันทึกการตั้งค่า
                    </button>
                  </div>
                </div>
              </div>
            )}

          </div>
        </div>
      );
    }

    // Render App
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
