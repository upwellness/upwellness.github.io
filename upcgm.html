<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Metabolic CGM Analyzer</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM (UMD) -->
  <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  
  <!-- PropTypes & ResizeObserver (Required for Recharts UMD) -->
  <script src="https://cdn.jsdelivr.net/npm/prop-types@15.8.1/prop-types.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/resize-observer-polyfill@1.5.1/dist/ResizeObserver.global.min.js"></script>
  
  <!-- Recharts (Pinned to 2.1.9 for stable browser UMD support) -->

  <!-- Babel for parsing JSX -->

  <style>

</head>
<body class="bg-slate-50 text-slate-800">
  <div id="root"></div>

  <!-- Main Application Script -->
  <script type="text/babel" data-type="module">
    const { useState, useMemo, useEffect, useCallback } = React;
    
    // Safety check for Recharts
    const recharts = window.Recharts || {};
    const { LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip: RechartsTooltip, ResponsiveContainer, ReferenceArea, ReferenceLine, ComposedChart, Legend } = recharts;

    // ==========================================
    // ⚙️ SUPABASE CONFIGURATION
    // ==========================================
    const SUPABASE_URL = 'https://qzqvwbucjxwgtmbdkrlu.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF6cXZ3YnVjanh3Z3RtYmRrcmx1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjUzNzgxODksImV4cCI6MjA4MDk1NDE4OX0.RYvc5kMueNhsOu---WOKcXYnOZLVnjiWklp1IiHmgS8';
    
    const isSupabaseConfigured = SUPABASE_URL !== 'YOUR_SUPABASE_URL' && SUPABASE_ANON_KEY !== 'YOUR_SUPABASE_ANON_KEY';
    const supabase = isSupabaseConfigured ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;

    // --- SVG Icons Components ---
    const IconActivity = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>;
    const IconCalendar = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>;
    const IconClock = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>;
    const IconUpload = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>;
    const IconUtensils = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/></svg>;
    const IconUser = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>;
    const IconSave = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>;
    const IconLoader = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className + " animate-spin"}><line x1="12" x2="12" y1="2" y2="6"/><line x1="12" x2="12" y1="18" y2="22"/><line x1="4.93" x2="7.76" y1="4.93" y2="7.76"/><line x1="16.24" x2="19.07" y1="16.24" y2="19.07"/><line x1="2" x2="6" y1="12" y2="12"/><line x1="18" x2="22" y1="12" y2="12"/><line x1="4.93" x2="7.76" y1="19.07" y2="16.24"/><line x1="16.24" x2="19.07" y1="7.76" y2="4.93"/></svg>;
    const IconInfo = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="16" y2="12"/><line x1="12" x2="12.01" y1="8" y2="8"/></svg>;
    const IconCheckCircle = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><polyline points="9 11 12 14 22 4"/></svg>;
    const IconDatabase = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><ellipse cx="12" cy="5" rx="9" ry="3"></ellipse><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"></path><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"></path></svg>;
    const IconTrophy = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"></path><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"></path><path d="M4 22h16"></path><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"></path><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"></path><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"></path></svg>;
    const IconAlert = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>;
    const IconChartBar = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>;
    const IconX = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>;
    const IconCompare = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M16 3h5v5"></path><path d="M8 3H3v5"></path><path d="M12 22v-8"></path><path d="M5 9l7-4 7 4"></path><path d="M5 15l7 4 7-4"></path></svg>;

    // --- Helper Functions ---
    const parseDateString = (dateStr) => new Date(dateStr.replace(' ', 'T'));
    const formatTime = (date) => date.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
    const formatDate = (date) => date.toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: 'numeric' });
    const formatDateTime = (date) => `${formatDate(date)} ${formatTime(date)}`;
    const getLocalDateString = (date) => {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const day = String(date.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    };
    const chunkArray = (array, size) => {
      const chunks = [];
      for (let i = 0; i < array.length; i += size) chunks.push(array.slice(i, i + size));
      return chunks;
    };

    const RANGE_OPTIONS = [
      { label: '4 ชั่วโมง', hours: 4 },
      { label: '8 ชั่วโมง', hours: 8 },
      { label: '12 ชั่วโมง', hours: 12 },
      { label: '24 ชั่วโมง', hours: 24 },
      { label: '3 วัน', hours: 72 },
      { label: '7 วัน', hours: 168 },
      { label: '14 วัน', hours: 336 },
    ];

    // --- Main Component ---
    function App() {
      const [availableProfiles, setAvailableProfiles] = useState([]);
      const [allData, setAllData] = useState([]);
      const [allMeals, setAllMeals] = useState([]);
      
      const [selectedProfile, setSelectedProfile] = useState('');
      const [dropdownProfile, setDropdownProfile] = useState('');
      const [newProfileName, setNewProfileName] = useState('');
      
      // Tabs: 'dashboard' | 'analyzer'
      const [activeTab, setActiveTab] = useState('dashboard');

      // Refresh Trigger to re-fetch data after mutation
      const [refreshTrigger, setRefreshTrigger] = useState(0);
      
      // Time Filtering State
      const [anchorDateStr, setAnchorDateStr] = useState('');
      const [timeRangeHours, setTimeRangeHours] = useState(24);
      
      const [isUploading, setIsUploading] = useState(false);
      const [uploadProgress, setUploadProgress] = useState(0);
      const [newMealTime, setNewMealTime] = useState('');
      const [newMealDesc, setNewMealDesc] = useState('');

      // Comparison Feature State
      const [compareIds, setCompareIds] = useState([]);
      const [showCompareModal, setShowCompareModal] = useState(false);
      const COMPARE_COLORS = ['#14b8a6', '#f43f5e', '#8b5cf6', '#f59e0b']; // Teal, Rose, Violet, Amber

      // 1. Fetch available profiles on mount (Loop through pagination to get ALL distinct profiles)
      useEffect(() => {
        if (!supabase) return;
        const fetchProfiles = async () => {
          let allProfiles = new Set();
          let hasMore = true;
          let start = 0;
          const step = 1000; 

          try {
            while (hasMore) {
              const { data, error } = await supabase.from('cgm_readings').select('profile_name').range(start, start + step - 1);
              if (error) throw error;
              if (!data || data.length === 0) break;
              data.forEach(d => { if (d.profile_name) allProfiles.add(d.profile_name); });
              if (data.length < step) hasMore = false; else start += step;
            }
            setAvailableProfiles([...allProfiles].sort());
          } catch (err) { console.error("Error fetching profiles:", err); }
        };
        fetchProfiles();
      }, [refreshTrigger]);

      // 2. Fetch Data for Selected Profile
      useEffect(() => {
        if (!selectedProfile || !supabase) return;
        
        const loadData = async () => {
          try {
            let allReadings = [];
            let hasMore = true;
            let start = 0;
            const step = 1000;

            while (hasMore) {
              const { data, error } = await supabase
                .from('cgm_readings').select('*')
                .eq('profile_name', selectedProfile).order('reading_timestamp', { ascending: true })
                .range(start, start + step - 1);
                
              if (error) throw error;
              if (!data || data.length === 0) break;
              allReadings = [...allReadings, ...data];
              if (data.length < step) hasMore = false; else start += step;
            }

            const resMeals = await supabase
               .from('cgm_meals').select('*')
               .eq('profile_name', selectedProfile).order('meal_timestamp', { ascending: true });

            if (resMeals.error) throw resMeals.error;

            const mappedData = allReadings.map(d => ({
              profile: d.profile_name, originalTime: d.original_time,
              timestamp: Number(d.reading_timestamp), dateStr: d.date_str,
              glucose: d.glucose, time: new Date(Number(d.reading_timestamp))
            }));
            
            const mappedMeals = (resMeals.data || []).map(m => ({
              id: m.id, profile: m.profile_name,
              timestamp: Number(m.meal_timestamp), dateStr: m.date_str,
              description: m.description, time: new Date(Number(m.meal_timestamp))
            }));

            setAllData(mappedData);
            setAllMeals(mappedMeals);
          } catch (err) {
            console.error("Error loading Supabase data:", err);
            alert("เกิดข้อผิดพลาดในการโหลดข้อมูล กรุณาตรวจสอบ Console");
          }
        };
        loadData();
      }, [selectedProfile, refreshTrigger]);

      const uniqueDays = useMemo(() => {
        const days = allData.map(d => d.dateStr);
        return [...new Set(days)].sort((a, b) => new Date(b) - new Date(a));
      }, [allData]);

      useEffect(() => {
        if (uniqueDays.length > 0 && (!anchorDateStr || !uniqueDays.includes(anchorDateStr))) {
          setAnchorDateStr(uniqueDays[0]);
        }
      }, [uniqueDays, anchorDateStr]);

      const { startTimestamp, endTimestamp } = useMemo(() => {
        if (!anchorDateStr || allData.length === 0) return { startTimestamp: 0, endTimestamp: 0 };
        const dataInDay = allData.filter(d => d.dateStr === anchorDateStr);
        let maxTs = 0;
        if (dataInDay.length > 0) { maxTs = Math.max(...dataInDay.map(d => d.timestamp)); } 
        else { maxTs = new Date(`${anchorDateStr}T23:59:59`).getTime(); }
        const startTs = maxTs - (timeRangeHours * 60 * 60 * 1000);
        return { startTimestamp: startTs, endTimestamp: maxTs };
      }, [anchorDateStr, timeRangeHours, allData]);

      const currentRangeData = useMemo(() => {
        if (allData.length === 0 || startTimestamp === 0) return [];
        return allData.filter(d => d.timestamp > startTimestamp && d.timestamp <= endTimestamp);
      }, [allData, startTimestamp, endTimestamp]);

      const rangeStats = useMemo(() => {
        if (currentRangeData.length === 0) return null;
        let sum = 0, optimal = 0, acceptable = 0, low = 0;
        currentRangeData.forEach(d => {
          sum += d.glucose;
          if (d.glucose < 70) low++;
          else if (d.glucose <= 110) optimal++;
          else if (d.glucose <= 140) acceptable++;
        });
        const total = currentRangeData.length;
        const mean = sum / total;
        let sumSqDiff = 0;
        currentRangeData.forEach(d => { sumSqDiff += Math.pow(d.glucose - mean, 2); });
        const sd = Math.sqrt(sumSqDiff / total);
        const cv = (sd / mean) * 100;

        return {
          avg: Math.round(mean), optimalPct: Math.round((optimal / total) * 100),
          acceptablePct: Math.round((acceptable / total) * 100), lowPct: Math.round((low / total) * 100),
          min: Math.min(...currentRangeData.map(d => d.glucose)),
          max: Math.max(...currentRangeData.map(d => d.glucose)),
          cv: cv.toFixed(1)
        };
      }, [currentRangeData]);

      const handleFileUpload = (event) => {
        if (!selectedProfile || !supabase) return;
        const file = event.target.files[0];
        if (!file) return;

        setIsUploading(true);
        setUploadProgress(0);

        const reader = new FileReader();
        reader.onload = async (e) => {
          const lines = e.target.result.trim().split('\n');
          const parsedData = lines.slice(1).map(line => {
            const [timeStr, glucStr] = line.split(',');
            if (!timeStr || !glucStr) return null;
            const timeObj = parseDateString(timeStr);
            if (isNaN(timeObj.getTime())) return null;
            return {
              profile_name: selectedProfile, original_time: timeStr,
              reading_timestamp: timeObj.getTime(), date_str: getLocalDateString(timeObj),
              glucose: parseFloat(glucStr)
            };
          }).filter(d => d && !isNaN(d.glucose));

          const chunks = chunkArray(parsedData, 500);
          let processed = 0;
          try {
            for (const chunk of chunks) {
              const { error } = await supabase.from('cgm_readings').upsert(chunk, { onConflict: 'profile_name, reading_timestamp' });
              if (error) throw error;
              processed += chunk.length;
              setUploadProgress(Math.round((processed / parsedData.length) * 100));
            }
          } catch (err) {
            console.error("Upload error:", err); alert("เกิดข้อผิดพลาดในการอัปโหลด: " + err.message);
          } finally {
            setIsUploading(false); setRefreshTrigger(prev => prev + 1); event.target.value = '';
          }
        };
        reader.readAsText(file);
      };

      const handleAddMeal = async (e) => {
        e.preventDefault();
        if (!newMealTime || !selectedProfile || !supabase) return;
        const mealDateTime = new Date(`${anchorDateStr}T${newMealTime}`);
        const timestamp = mealDateTime.getTime();
        const newMeal = { profile_name: selectedProfile, meal_timestamp: timestamp, date_str: anchorDateStr, description: newMealDesc || 'มื้ออาหาร' };

        try {
          const { error } = await supabase.from('cgm_meals').insert([newMeal]);
          if (error) throw error;
          setNewMealTime(''); setNewMealDesc(''); setRefreshTrigger(prev => prev + 1);
        } catch (err) {
          console.error("Add meal error:", err); alert("ไม่สามารถเพิ่มมื้ออาหารได้: " + err.message);
        }
      };

      const removeMeal = async (id) => {
        if (!supabase) return;
        try {
          const { error } = await supabase.from('cgm_meals').delete().eq('id', id);
          if (error) throw error;
          setRefreshTrigger(prev => prev + 1);
        } catch (err) { console.error("Delete meal error:", err); alert("ไม่สามารถลบมื้ออาหารได้"); }
      };

      // Helper to find closest glucose reading at a specific time (+/- 15 mins tolerance)
      const getGlucoseAtTime = (targetTs, toleranceMs = 15 * 60000) => {
        const windowData = allData.filter(d => Math.abs(d.timestamp - targetTs) <= toleranceMs);
        if (windowData.length === 0) return null;
        // Find the absolute closest
        let closest = windowData[0];
        let minDiff = Math.abs(windowData[0].timestamp - targetTs);
        windowData.forEach(d => {
          const diff = Math.abs(d.timestamp - targetTs);
          if (diff < minDiff) { minDiff = diff; closest = d; }
        });
        return closest.glucose;
      };

      // ==========================================
      // 🧠 ADVANCED MEAL ANALYSIS (UP Labs Concepts)
      // ==========================================
      const fullyAnalyzedMeals = useMemo(() => {
        return allMeals.map(meal => {
          // 1. Baseline (Closest reading before or at meal time)
          const beforeMealData = allData.filter(d => d.timestamp <= meal.timestamp);
          const baseline = beforeMealData.length > 0 ? beforeMealData[beforeMealData.length - 1].glucose : null;
          
          // 2. Window Data (Up to 3 hours)
          const windowEnd = meal.timestamp + (3 * 60 * 60 * 1000);
          const windowData = allData.filter(d => d.timestamp >= meal.timestamp && d.timestamp <= windowEnd);
          
          if (windowData.length === 0 || !baseline) return { ...meal, baseline: null, peakGlucose: null, delta: null, valid: false };

          // 3. Peak Finding
          let peakData = windowData[0];
          windowData.forEach(d => { if (d.glucose > peakData.glucose) peakData = d; });
          const lagMins = Math.round((peakData.timestamp - meal.timestamp) / 60000);
          const delta = peakData.glucose - baseline;

          // 4. Time Checkpoints (1hr, 2hr, 3hr)
          const hr1 = getGlucoseAtTime(meal.timestamp + 1 * 3600000);
          const hr2 = getGlucoseAtTime(meal.timestamp + 2 * 3600000);
          const hr3 = getGlucoseAtTime(meal.timestamp + 3 * 3600000);

          // 5. Scoring & Ranking System (Out of 100)
          let score = 100;
          if (delta > 30) score -= (delta - 30); // Penalty for high spike
          if (lagMins > 60) score -= 10; // Penalty for slow processing
          if (hr2 && hr2 > baseline + 20) score -= 15; // Penalty if not recovered by 2hr
          if (hr3 && hr3 > baseline + 10) score -= 15; // Penalty if not recovered by 3hr
          
          // Clamp score
          score = Math.max(0, Math.min(100, Math.round(score)));

          let grade = 'C';
          if (score >= 85) grade = 'A';
          else if (score >= 60) grade = 'B';

          // 6. UP Labs Insights Generation
          let insights = [];
          if (delta <= 30 && hr2 && hr2 <= baseline + 10) {
            insights.push({ type: 'success', text: 'ขึ้นน้อย ลงเร็ว (Metabolic Flexible): ร่างกายจัดการคาร์บได้ดีมาก อินซูลินทำงานไวและปิดจ๊อบได้เร็ว' });
          } else if (delta > 50 && hr2 && hr2 > baseline + 30) {
            insights.push({ type: 'danger', text: 'ขึ้นสูง ลงช้า (Insulin Load): กระตุ้นอินซูลินหนักและค้างนาน อาจเกิด Randle Effect ทำให้ร่างกายเบรกการเผาผลาญไขมันยาวนาน' });
          } else if (delta > 50 && hr2 && hr2 <= baseline + 10) {
            insights.push({ type: 'warning', text: 'ขึ้นสูง ลงเร็ว (Spike & Crash): น้ำตาลเด้งแรง อินซูลินจึงหลั่งมาปราบอย่างหนัก อาจทำให้เกิดภาวะหิวเร็วหลังมื้ออาหาร' });
          }

          if (lagMins > 75) {
            insights.push({ type: 'info', text: 'Peak ช้า (>1 ชม.): มื้อนี้อาจมีไขมัน/โปรตีนสูง หรือการย่อยช้า ทำให้อินซูลินต้องหลั่งหล่อเลี้ยงเป็นเวลานาน' });
          }

          return {
            ...meal,
            valid: true,
            baseline,
            peakGlucose: peakData.glucose,
            peakTime: new Date(peakData.timestamp),
            lagMins,
            delta,
            hr1, hr2, hr3,
            score, grade, insights,
            // Attach unified timeframe data for comparison chart (0 to 180 mins)
            windowData: windowData.map(d => ({
              relativeMin: Math.round((d.timestamp - meal.timestamp) / 60000),
              glucose: d.glucose
            }))

        }).filter(m => m.valid).sort((a,b) => b.timestamp - a.timestamp); // Newest first
      }, [allMeals, allData]);

      // Meals in current Dashboard View range
      const analyzedMealsForDashboard = useMemo(() => {
        return fullyAnalyzedMeals.filter(m => m.timestamp >= startTimestamp && m.timestamp <= endTimestamp);

      // Comparison Logic Helpers
      const toggleCompare = (id) => {
        setCompareIds(prev => {

            alert("สามารถเลือกเปรียบเทียบได้สูงสุด 4 มื้ออาหารพร้อมกันครับ");

          return [...prev, id];

            const reading = meal.windowData.find(d => Math.abs(d.relativeMin - min) <= 2.5);

                        <div>
                          <h2 className="text-lg font-bold text-slate-800 flex items-center gap-2"><IconChartBar className="text-indigo-500" /> วิเคราะห์การตอบสนองเชิงลึก (1-3 ชม.)</h2>
                          <p className="text-xs text-slate-500 mt-1">ประเมินภาระอินซูลินและ Metabolic Flexibility ของแต่ละมื้ออาหาร</p>
                        </div>
                      </div>

                      <div className="overflow-x-auto custom-scrollbar">
                        {fullyAnalyzedMeals.length > 0 ? (
                          <table className="w-full text-left border-collapse min-w-[900px]">
                            <thead>
                              <tr className="bg-slate-50 text-slate-500 text-xs uppercase tracking-wider">
                                <th className="p-4 font-medium w-16 text-center">เทียบ</th>
                                <th className="p-4 font-medium w-[25%]">ข้อมูลมื้ออาหาร</th>
                                <th className="p-4 font-medium text-center border-l border-slate-200">Baseline<br/><span className="font-normal lowercase text-[10px]">(เริ่มกิน)</span></th>
                                <th className="p-4 font-medium text-center">Peak<br/><span className="font-normal lowercase text-[10px]">(จุดสูงสุด)</span></th>
                                <th className="p-4 font-medium text-center text-indigo-500">+1 ชม.</th>
                                <th className="p-4 font-medium text-center text-indigo-500">+2 ชม.</th>
                                <th className="p-4 font-medium text-center text-indigo-500">+3 ชม.</th>
                                <th className="p-4 font-medium w-[30%] border-l border-slate-200">Metabolic Insight (UP Labs)</th>
                                <th className="p-4"></th>
                              </tr>
                            </thead>
                            <tbody className="text-sm divide-y divide-slate-100">
                              {fullyAnalyzedMeals.map((meal) => (
                                <tr key={meal.id} className={`transition-colors ${compareIds.includes(meal.id) ? 'bg-indigo-50/40' : 'hover:bg-slate-50/50'}`}>
                                  {/* Compare Checkbox */}
                                  <td className="p-4 text-center">
                                    <input 
                                      type="checkbox" 
                                      className="w-4 h-4 text-indigo-600 rounded border-slate-300 focus:ring-indigo-500 cursor-pointer"
                                      checked={compareIds.includes(meal.id)}
                                      onChange={() => toggleCompare(meal.id)}
                                    />
                                  </td>
                                  
                                  {/* Meal Info */}
                                  <td className="p-4">
                                    <div className="flex items-center gap-3">
                                      <div className={`w-10 h-10 rounded-xl flex items-center justify-center font-bold text-lg
                                        ${meal.grade === 'A' ? 'bg-emerald-100 text-emerald-600' : 
                                          meal.grade === 'B' ? 'bg-amber-100 text-amber-600' : 'bg-rose-100 text-rose-600'}`}>
                                        {meal.grade}
                                      </div>
                                      <div>
                                        <div className="font-bold text-slate-800 text-base">{meal.description}</div>
                                        <div className="text-slate-500 text-xs flex items-center gap-1 mt-0.5"><IconClock size={12}/> {formatDateTime(meal.time)}</div>
                                      </div>
                                    </div>
                                  </td>
                                  
                                  {/* Timeline Data */}
                                  <td className="p-4 text-center border-l border-slate-100 font-medium text-slate-600">{meal.baseline || '-'}</td>
                                  <td className="p-4 text-center">
                                    <div className="font-bold text-slate-800">{meal.peakGlucose || '-'}</div>
                                    {meal.delta !== null && (
                                      <div className={`text-xs mt-1 font-bold ${meal.delta <= 30 ? 'text-emerald-500' : meal.delta <= 50 ? 'text-amber-500' : 'text-rose-500'}`}>
                                        +{Math.round(meal.delta)}
                                      </div>
                                    )}
                                    <div className="text-[10px] text-slate-400 mt-0.5">Lag: {meal.lagMins}m</div>
                                  </td>
                                  
                                  <td className="p-4 text-center text-slate-600">{meal.hr1 || '-'}</td>
                                  <td className="p-4 text-center">
                                    <span className={`font-medium ${meal.hr2 && meal.baseline && meal.hr2 > meal.baseline + 20 ? 'text-rose-500' : 'text-emerald-600'}`}>
                                      {meal.hr2 || '-'}
                                    </span>
                                  </td>
                                  <td className="p-4 text-center">
                                    <span className={`font-medium ${meal.hr3 && meal.baseline && meal.hr3 > meal.baseline + 10 ? 'text-rose-500' : 'text-emerald-600'}`}>
                                      {meal.hr3 || '-'}
                                    </span>
                                  </td>

                                  {/* Insights */}
                                  <td className="p-4 border-l border-slate-100">
                                    <div className="space-y-2">
                                      {meal.insights.map((insight, idx) => (
                                        <div key={idx} className={`text-xs p-2 rounded-lg leading-relaxed border
                                          ${insight.type === 'success' ? 'bg-emerald-50 text-emerald-800 border-emerald-100' : 
                                            insight.type === 'danger' ? 'bg-rose-50 text-rose-800 border-rose-100' : 
                                            insight.type === 'warning' ? 'bg-amber-50 text-amber-800 border-amber-100' :
                                            'bg-slate-50 text-slate-700 border-slate-200'}`}>
                                          {insight.text}
                                        </div>
                                      ))}
                                      {meal.insights.length === 0 && (
                                        <div className="text-xs text-slate-400 italic">ข้อมูลไม่เพียงพอหรืออยู่ในเกณฑ์ปกติ</div>
                                      )}
                                    </div>
                                  </td>
                                  
                                  {/* Action */}
                                  <td className="p-4 text-right">
                                    <button onClick={() => removeMeal(meal.id)} className="text-slate-300 hover:text-rose-500 transition-colors p-2" title="ลบมื้ออาหาร">
                                      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path></svg>
                                    </button>
                                  </td>
                                </tr>
                              ))}
                            </tbody>
                          </table>
                        ) : (
                          <div className="flex flex-col items-center justify-center text-slate-400 py-16">
                            <IconUtensils size={40} className="mb-4 opacity-20" />
                            <p className="text-lg font-medium text-slate-500">ยังไม่มีบันทึกมื้ออาหารเพื่อการวิเคราะห์</p>
                            <p className="text-sm mt-1">กลับไปที่หน้า Dashboard เพื่อเพิ่มมื้ออาหาร</p>
                          </div>
                        )}
                      </div>
                    </div>
                  </div>
                )}
              </>
            )}

            {/* Floating Action Bar for Comparison */}
            {compareIds.length > 0 && activeTab === 'analyzer' && (
              <div className="fixed bottom-8 left-1/2 -translate-x-1/2 bg-slate-900/95 backdrop-blur shadow-2xl rounded-full px-6 py-4 flex items-center gap-6 z-40 border border-slate-700 animate-in slide-in-from-bottom-10 fade-in">
                <div className="text-slate-200 font-medium text-sm">
                  เลือกเปรียบเทียบ <span className="text-white font-bold bg-slate-700 px-2 py-0.5 rounded-md mx-1">{compareIds.length}/4</span> รายการ
                </div>
                <div className="flex gap-2">
                  <button 
                    onClick={() => setCompareIds([])} 
                    className="text-slate-400 hover:text-white px-3 py-2 text-sm transition-colors"
                  >
                    ล้างทั้งหมด
                  </button>
                  <button 
                    onClick={() => setShowCompareModal(true)} 
                    className="bg-indigo-500 hover:bg-indigo-400 text-white px-5 py-2 rounded-full font-bold text-sm shadow-[0_0_15px_rgba(99,102,241,0.5)] transition-all flex items-center gap-2"
                  >
                    <IconCompare size={16} /> ดูผลเปรียบเทียบ
                  </button>
                </div>
              </div>
            )}

            {/* Comparison Modal Overlay */}
            {showCompareModal && selectedCompareMeals.length > 0 && (
              <div className="fixed inset-0 z-50 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 sm:p-6 animate-in fade-in duration-200">
                <div className="bg-white w-full max-w-6xl max-h-full overflow-hidden flex flex-col rounded-3xl shadow-2xl border border-slate-200">
                  
                  {/* Modal Header */}
                  <div className="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                    <h2 className="text-xl font-bold text-slate-800 flex items-center gap-2">
                      <IconCompare className="text-indigo-500" /> 
                      วิเคราะห์เปรียบเทียบมื้ออาหาร (UP Labs Metabolic Response)
                    </h2>
                    <button onClick={() => setShowCompareModal(false)} className="text-slate-400 hover:text-slate-700 hover:bg-slate-200 p-2 rounded-full transition-colors">
                      <IconX size={24} />
                    </button>
                  </div>

                  {/* Modal Content - Scrollable */}
                  <div className="p-6 overflow-y-auto custom-scrollbar flex-1 flex flex-col gap-8 bg-slate-50/30">
                    
                    {/* The Comparison Line Chart */}
                    <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                      <h3 className="text-base font-bold text-slate-700 mb-6 text-center">กราฟการตอบสนองของระดับน้ำตาล (0-3 ชั่วโมง)</h3>
                      <div className="h-80 w-full">
                        <ResponsiveContainer width="100%" height="100%">
                          <LineChart data={comparisonChartData} margin={{ top: 10, right: 30, left: 0, bottom: 0 }}>
                            <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#e2e8f0" />
                            <XAxis 
                              dataKey="minute" type="number" domain={[0, 180]} 
                              ticks={[0, 30, 60, 90, 120, 150, 180]} 
                              tickFormatter={(min) => `${min} นาที`} 
                              stroke="#94a3b8" fontSize={12} 
                            />
                            <YAxis domain={['auto', 'auto']} stroke="#94a3b8" fontSize={12} tickCount={6}/>
                            <RechartsTooltip 
                              content={({ active, payload, label }) => {
                                if (active && payload && payload.length) {
                                  return (
                                    <div className="bg-white/95 p-4 rounded-xl shadow-lg border border-slate-200 min-w-[200px]">
                                      <p className="text-slate-600 text-xs mb-3 font-bold border-b pb-2">เวลาผ่านไป: {label} นาที</p>
                                      <div className="space-y-2">
                                        {payload.map((entry, idx) => (
                                          <div key={idx} className="flex justify-between items-center gap-4 text-sm">
                                            <span className="flex items-center gap-2">
                                              <span className="w-2 h-2 rounded-full" style={{ backgroundColor: entry.color }}></span>
                                              <span className="text-slate-600 truncate max-w-[120px]" title={entry.name}>{entry.name}</span>
                                            </span>
                                            <span className="font-bold text-slate-800">{entry.value}</span>
                                          </div>
                                        ))}
                                      </div>
                                    </div>
                                  );
                                }
                                return null;
                              }} 
                            />
                            <Legend wrapperStyle={{ paddingTop: '20px' }} />
                            
                            {/* Target Zones & Markers */}
                            <ReferenceLine x={60} stroke="#94a3b8" strokeDasharray="3 3" label={{ position: 'insideTopLeft', value: '1 ชม.', fill: '#94a3b8', fontSize: 10 }} />
                            <ReferenceLine x={120} stroke="#94a3b8" strokeDasharray="3 3" label={{ position: 'insideTopLeft', value: '2 ชม.', fill: '#94a3b8', fontSize: 10 }} />
                            <ReferenceLine x={180} stroke="#94a3b8" strokeDasharray="3 3" label={{ position: 'insideTopLeft', value: '3 ชม.', fill: '#94a3b8', fontSize: 10 }} />

                            {selectedCompareMeals.map((meal, idx) => (
                              <Line 
                                key={meal.id} 
                                type="monotone" 
                                dataKey={`meal_${meal.id}`} 
                                name={meal.description} 
                                stroke={COMPARE_COLORS[idx % COMPARE_COLORS.length]} 
                                strokeWidth={3} 
                                dot={false} 
                                activeDot={{ r: 6, strokeWidth: 0 }} 
                                connectNulls={true} 
                              />
                            ))}
                          </LineChart>
                        </ResponsiveContainer>
                      </div>
                    </div>

                    {/* Stats Comparison Cards */}
                    <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-4">
                      {selectedCompareMeals.map((meal, idx) => (
                        <div key={meal.id} className="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 flex flex-col" style={{ borderTop: `4px solid ${COMPARE_COLORS[idx % COMPARE_COLORS.length]}` }}>
                          
                          <div className="flex justify-between items-start mb-4">
                            <div>
                              <h3 className="font-bold text-slate-800 text-lg leading-tight">{meal.description}</h3>
                              <p className="text-xs text-slate-500 mt-1">{formatDateTime(meal.time)}</p>
                            </div>
                            <div className={`w-10 h-10 shrink-0 rounded-xl flex items-center justify-center font-bold text-lg
                              ${meal.grade === 'A' ? 'bg-emerald-100 text-emerald-600' : 
                                meal.grade === 'B' ? 'bg-amber-100 text-amber-600' : 'bg-rose-100 text-rose-600'}`}>
                              {meal.grade}
                            </div>
                          </div>

                          <div className="space-y-3 flex-1 mb-4">
                            <div className="flex justify-between text-sm border-b border-slate-50 pb-1">
                              <span className="text-slate-500">ก่อนเริ่มกิน (Baseline)</span>
                              <span className="font-semibold text-slate-700">{meal.baseline}</span>
                            </div>
                            <div className="flex justify-between text-sm border-b border-slate-50 pb-1">
                              <span className="text-slate-500">จุดสูงสุด (Peak)</span>
                              <span className="font-bold text-slate-800">{meal.peakGlucose} <span className={`text-xs ${meal.delta <= 30 ? 'text-emerald-500' : meal.delta <= 50 ? 'text-amber-500' : 'text-rose-500'}`}>(+{Math.round(meal.delta)})</span></span>
                            </div>
                            <div className="flex justify-between text-sm border-b border-slate-50 pb-1">
                              <span className="text-slate-500">เวลาออกฤทธิ์ (Lag Time)</span>
                              <span className="font-semibold text-slate-700">{meal.lagMins} นาที</span>
                            </div>
                            <div className="flex justify-between text-sm border-b border-slate-50 pb-1">
                              <span className="text-slate-500">ฟื้นตัว 2 ชม. (+2h)</span>
                              <span className={`font-semibold ${meal.hr2 && meal.baseline && meal.hr2 > meal.baseline + 20 ? 'text-rose-500' : 'text-emerald-600'}`}>
                                {meal.hr2 || '-'}
                              </span>
                            </div>
                            <div className="flex justify-between text-sm border-b border-slate-50 pb-1">
                              <span className="text-slate-500">ฟื้นตัว 3 ชม. (+3h)</span>
                              <span className={`font-semibold ${meal.hr3 && meal.baseline && meal.hr3 > meal.baseline + 10 ? 'text-rose-500' : 'text-emerald-600'}`}>
                                {meal.hr3 || '-'}
                              </span>
                            </div>
                          </div>

                          <div className="bg-slate-50 p-3 rounded-xl border border-slate-100">
                            <div className="text-xs font-bold text-slate-600 mb-1">UP Labs Insight:</div>
                            <p className="text-[11px] leading-relaxed text-slate-600">
                              {meal.insights.length > 0 ? meal.insights[0].text : 'ข้อมูลปกติ (ไม่มีความสวิงแบบนัยยะสำคัญ)'}
                            </p>
                          </div>
                          
                        </div>
                      ))}
                    </div>

                  </div>
                </div>
              </div>
            )}

          </div>
        </div>
      );
    }

    // Render App
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
