ght): soft mint #BBEED6 band.\n- Thai text bold #201A1A: \"→ ความจริงของ IF\"\n- Right edge: small arrow icon\n\nStyle: clinical luxury, every element grid-aligned, structured but breathable. No photography. Data visualization clarity.\n\n--ar 1:1 --style raw","up_angle":"UP Wellness 'ความจริง' value — กล้า bust myth · ลูกค้าที่ทำ IF แล้วไม่ลงควรอ่าน","key_finding":"การกินใน window 8-10 ชม. แต่ไม่ลดแคลอรี่ → ไม่เห็นผลทาง metabolic หรือ cardiovascular เพียงแต่ส่งผลต่อ internal clock","source":"https://www.sciencedaily.com/releases/2025/12/251228020018.htm","caption_status":"POSTED","image_status":"PROMPT-READY"},{"date":"2026-05-01","time":"20:00","theme":"REFEED","topic":"กลไกที่ทำให้ IF ยืดอายุ คือช่วงคุณ 'เริ่มกินกลับ'","category":"Fasting / Longevity","post_type":"Hero · Editorial Magazine Documentary","image_style":"editorial","caption":"สิ่งที่ผมเคยเข้าใจผิดเรื่อง Intermittent Fasting มา 5 ปี\n\nเคยคิดว่ากลไกที่ทำให้ IF ยืดอายุได้ คือ \"ตอนอด\" — ร่างกาย autophagy ล้างของเสีย เผาไขมัน แต่ผลวิจัยล่าสุดจาก UT Southwestern (เมษายน 2026) บอกอีกแบบ\n\nนักวิจัยศึกษาในหนอน C. elegans พบว่ากลไกที่ยืดอายุไม่ใช่ \"ตัวการอด\" แต่คือ \"ช่วง refeeding\" — ตอนที่ร่างกายเริ่มกินกลับ ร่างกายจะ pivot metabolic อย่างรุนแรง สร้าง stress response → กระตุ้น cell repair → ยืดอายุ\n\nหมายความว่าอะไรกับคนทั่วไป?\n🌿 IF ที่ทำเสร็จแล้ว \"กินอะไรกลับ\" สำคัญพอๆ กับที่อด\n🌿 break fast ด้วยขนมหวาน-อาหาร junk = เสีย benefit ทั้งหมด\n🌿 break fast ด้วย protein + ผัก + healthy fat = เก็บ benefit ได้\n🌿 IF ที่ break ไม่ดี อาจไม่ได้ผลเลย\n\nพูดตรงๆ ผมก็เคยทำผิด — อด 16 ชั่วโมง แล้วเปิดด้วย bingsoo + bubble tea ตอนบ่าย อันนี้คือ break fast ที่แย่ที่สุดเลยสำหรับ longevity benefit\n\n⚠️ หมายเหตุสำคัญ — งานวิจัยนี้ทำในหนอน ไม่ใช่คน ผมไม่ได้บอกว่าคนจะได้ผลเหมือนกันเป๊ะ แต่กลไก refeeding response ในสัตว์เลี้ยงลูกด้วยนมก็มีหลักฐานสะสมมา สิ่งที่ทำได้เลยคือ — ใส่ใจว่าคุณ \"เริ่มกิน\" ด้วยอะไร มันสำคัญพอๆ กับที่คุณ \"ไม่กิน\"\n\nUP Wellness ปรึกษาเรื่อง IF protocol ที่เหมาะกับ lifestyle ลูกค้า — ถ้ากำลังทำ าลดน้ำหนัก Semaglutide / Tirzepatide ใช้ GLP-1 receptor ผลข้างเคียงหลักคือคลื่นไส้ อาเจียน — บางคนทนไม่ได้ต้องหยุด ทีมนี้ออกแบบ molecule ที่กระตุ้น GIP + Glucagon receptor ไม่ใช่ GLP-1 — และใน rodent + monkey study ลดน้ำหนักได้เทียบเท่า GLP-1 class แต่ \"ไม่มีอาการคลื่นไส้\"\n\nพูดตรงๆ ผมตื่นเต้นแต่ก็ระวังเหมือนกัน —\n🌿 งานวิจัยยังอยู่ใน animal model ไม่ใช่คน\n🌿 ผ่าน human trial ต้องใช้เวลาอีก 3-5 ปีเป็นอย่างน้อย\n🌿 ใครที่ตอนนี้ใช้ Ozempic / Mounjaro อยู่ — ยังคงใช้ต่อไป ไม่ต้องเปลี่ยน\n\nแต่ที่อยากแชร์เพราะ — สำหรับคนที่ \"อยากใช้ GLP-1 แต่ทนคลื่นไส้ไม่ได้\" อาจจะมี alternative ในอนาคตอันใกล้ ที่เลยปัญหานี้ได้\n\n⚠️ ข้อสำคัญที่อยากย้ำ:\nยาลดน้ำหนักทุกตัว — ผลข้างเคียงหนึ่งที่งานวิจัยพบเรื่อยๆ คือ muscle loss (กล้ามเนื้อหายไปพร้อมไขมัน) ถ้าไม่ออกกำลังกาย resistance training ควบคู่ และไม่กิน protein พอ น้ำหนักลด แต่กลายเป็น sarcopenia — แก่เร็วกว่าเดิม\n\nUP Wellness ไม่ได้ขายยา GLP-1 — เราเป็นที่ปรึกษาเรื่อง holistic weight loss ถ้าคุณกำลังคิดเรื่องยา หรือเลิกยา — inbox มาคุยกันก่อนได้ ทุก case ไม่เหมือนกัน\n\n📚 อ้างอิง: STAT News — \"Weight loss drugs without side effects? Top researchers propose new approach\" (April 16, 2026)\nstatnews.com/2026/04/16/glp1-weight-loss-new-approach/\n\n#UPwellness 🌸 #UPLabs 🧪\n#Ozempic #Mounjaro #GLP1 #ลดน้ำหนัก #สุขภาพคนไทย #weightlossthailand #LongevityThailand #ยาลดน้ำหนัก #GIP #glucagon #Tirzepatide #metabolichealth #obesity #งานวิจัยใหม่","prompt_news":"[UPLOAD: UP Wellness logo file as reference image — attach when generating]\n\nNews-style headline graphic, 1:1 square, dramatic editorial poster aesthetic.\n\nBackground: split layout — top 20% is a solid bar in deep #8C4C4C (Old Rose), bottom 80% is warm cream #FFF8F7 with subtle paper grain.\n\nTop bar zone:\n- Left: UP Wellness logo from uploaded reference, scaled to 18% width, in light/cream version on the rose bar.\n- Right: small Thai overline label in white, letter-spaced caps:\n  \"GIP + GLUCAGON · STAT NEWS APR 2026\"\n\nHero zone (cream area, dominating composition): _status":"PROMPT-READY"},{"date":"2026-05-04","time":"20:00","theme":"PROTEIN12","topic":"RDA โปรตีนผิดมานาน — ผู้หญิงสูงวัยต้องกิน 1.2 g/kg ไม่ใช่ 0.8","category":"Nutrition","post_type":"Hero · Style 02 Editorial","image_style":"editorial","caption":"สิ่งที่ผมเคยเข้าใจผิดเรื่องโปรตีนผู้สูงอายุมา 5 ปี — RDA 0.8 g/kg ที่ทุกคนใช้กันอาจน้อยเกินไป โดยเฉพาะกับผู้หญิง 60+ ที่มีความเสี่ยง sarcopenia\n\nRCT 12 สัปดาห์กับผู้หญิงไทย 126 คน อายุ 60-75 (Frontiers in Nutrition, 2025) — กลุ่มที่ได้โปรตีน 1.2 g/kg/วัน เพิ่ม lean mass และ functional outcomes (grip strength, gait speed) เหนือกลุ่ม 0.8 g/kg อย่างมีนัยสำคัญ ตัวเลข RDA เดิมที่เราใช้กันมาหลายสิบปีอาจเป็นค่า \"ขั้นต่ำเพื่อไม่ขาด\" ไม่ใช่ \"ค่าที่ดีที่สุดเพื่อรักษากล้ามเนื้อ\"\n\nสำหรับคนอายุ 60+ ตั้งเป้าใหม่\n🌿 น้ำหนัก 60 กก. = 72 กรัม/วัน (เดิม 48 กรัม) เพิ่มขึ้น 50%\n🌿 กระจายโปรตีนทุกมื้อ มื้อละ 25-30 กรัม (สูงสุดต่อรอบดูดซึม)\n🌿 แหล่งคุณภาพ: ไข่ ปลา อกไก่ เต้าหู้แข็ง greek yogurt\n🌿 ถ้ากินมื้อปกติไม่ถึง — protein shake / whey เป็นตัวช่วย ไม่ใช่ของฟุ่มเฟือย\n\nพูดตรงๆ Sarcopenia (กล้ามเนื้อหายตามวัย) คือเหตุผลเบื้องหลังการล้ม-การกระดูกหัก-การเสียอิสรภาพในผู้สูงอายุ ส่วนใหญ่ค่อยๆ เกิดเงียบๆ จนวันหนึ่งลุกจากเก้าอี้ไม่ไหว — โปรตีนคือ insurance ที่ราคาถูกที่สุดในการป้องกัน\n\n⚠️ ถ้าเป็นโรคไตระยะ 3 ขึ้นไป หรือมีค่า creatinine ผิดปกติ ห้ามเพิ่มโปรตีนเอง ปรึกษาหมอ/นักกำหนดอาหารก่อน\n\nUP Wellness ออกแบบ Senior Protein Plan ให้คุณแม่/คุณยายโดยเฉพาะ — Nutrilite All Plant Protein เป็นทางเลือกหนึ่งสำหรับคนกินยาก หรือกลืนลำบาก\n\n📚 อ้างอิง: Frontiers in Nutrition 2025 (RCT n=126, Thai women 60-75)\nhttps://www.frontiersin.org/journals/nutrition/articles/10.3389/fnut.2025.1547325/full\n\n#UPwellness 🌸 #UPLabs 🧪 #โปรตีน #protein #sarcopenia #ผู้สูงอายุ #คุณแม่ #leanmass #musclehealth #สุขภาพคนไทย #LongevityThailand #งานวิจัยล่าสุด #ดูแลตัวเอง #Nutrilite #AllPlantProtein #wellnessthailand #healthyaging #RDA","prompt_news":"[UPLOAD: UP Wellness logo file as reference image — attach when generating]\n\nNews-style headline graphic, 1:1 "},{"date":"2026-05-05","time":"12:30","theme":"MENOBRAIN","topic":"วัยทอง = เหตุการณ์สมอง ไม่ใช่แค่ฮอร์โมน — MRI เห็น grey matter หายจริง","category":"Women's Health","post_type":"Companion · Style 03 Quote/Data","image_style":"quote","caption":"พูดตรงๆ นะครับ — ที่ภรรยาหรือคุณแม่บอกว่า \"หลงๆลืมๆ อารมณ์แปรปรวน\" ช่วงวัย 45-55 ไม่ใช่เรื่อง \"คิดไปเอง\" MRI ตอนนี้เห็นชัดแล้วว่าสมองเปลี่ยนจริง\n\nWHEALTH Summit 2026 (Northeastern University, เม.ย. 2026) เผยข้อมูล MRI ของผู้หญิงช่วงเปลี่ยนวัย — เห็น grey matter ในสมองส่วนความจำ (hippocampus) และส่วนควบคุมอารมณ์ (prefrontal cortex) ลดลงจริง วัยทองจึงไม่ใช่แค่เรื่องฮอร์โมน แต่เป็น 'neurological event' ที่กินเวลาหลายปี\n\nวิธีดูแลสมองในช่วง perimenopause → postmenopause\n🌿 Omega-3 (EPA/DHA): หลายงานวิจัยช่วยรักษา grey matter volume\n🌿 โปรตีน + อาหารต้านอักเสบ: ลด neuroinflammation ที่เร่งช่วงนี้\n🌿 ออกกำลังกายแบบ resistance: เพิ่ม BDNF (สาร \"ปุ๋ย\" สมอง)\n🌿 นอนให้ดี — ลดแอลกอฮอล์ใกล้นอน (ตัวเร่ง brain fog)\n\nพูดตรงๆ เป้าหมายไม่ใช่ \"ฝืนผ่าน\" แต่คือดูแลสมองในจังหวะที่มันต้องการมากที่สุด — ผู้หญิงที่จัดการช่วงนี้ดี = สร้าง cognitive reserve ได้เยอะ ลดความเสี่ยง dementia ระยะยาว เพราะดอกผลของช่วงนี้จะไปโผล่ตอนอายุ 70+\n\n⚠️ ถ้ามีอาการรุนแรง (ซึมเศร้า อาการนอนไม่หลับเรื้อรัง อารมณ์แปรปรวนกระทบงาน) ควรพบแพทย์ — HRT มีบทบาทกับบางคน ไม่ควรตัดสินใจเอง\n\nUP Wellness Women's Wellness Protocol ออกแบบเฉพาะช่วง perimenopause → postmenopause เน้น brain-supportive nutrition ที่ตรงกับ research ใหม่นี้ ปรึกษาฟรีนะครับ\n\n📚 อ้างอิง: Northeastern University · WHEALTH Summit 2026\nhttps://news.northeastern.edu/2026/04/08/menopause-workplace-research-center/\n\n#UPwellness 🌸 #UPLabs 🧪 #วัยทอง #menopause #perimenopause #brainfog #ผู้หญิง #womenshealth #greymatter #BDNF #neuroinflammation #สุขภาพคนไทย #LongevityThailand #omega3 #งานวิจัยล่าสุด #ดูแลตัวเอง #Nutrilite #wellnessthailand","prompt_news":"[UPLOAD: UP Wellness logo file as reference image — attach when generating]\n\nNews-style headline graphic, 1:1 square, dramatic editorial pos const fmtThaiDate = (iso) => {
  if (!iso) return "-";
  const d = new Date(iso + "T00:00:00");
  const days = ["อาทิตย์","จันทร์","อังคาร","พุธ","พฤหัส","ศุกร์","เสาร์"];
  return `${days[d.getDay()]} ${d.getDate()}/${d.getMonth()+1}`;
};

function Toast({msg}) {
  if (!msg) return null;
  return <div className="fixed bottom-6 left-1/2 -translate-x-1/2 bg-stone-900 text-white px-5 py-2 rounded-full text-xs font-semibold shadow-lg z-50 animate-pulse">{msg}</div>;
}

function Section({id, icon, title, subtitle, count, children, color="rose"}) {
  const colors = {
    rose: "from-rose-50 to-stone-50 border-rose-200",
    amber: "from-amber-50 to-stone-50 border-amber-200",
    emerald: "from-emerald-50 to-stone-50 border-emerald-200",
    indigo: "from-indigo-50 to-stone-50 border-indigo-200",
    violet: "from-violet-50 to-stone-50 border-violet-200"
  };
  return (
    <section id={id} className={`rounded-2xl bg-gradient-to-br ${colors[color]} border p-5 mb-6`}>
      <div className="flex items-baseline justify-between mb-4">
        <div>
          <h2 className="text-lg font-bold text-stone-900 flex items-center gap-2">
            <span className="text-2xl">{icon}</span> {title}
          </h2>
          {subtitle && <p className="text-xs text-stone-500 mt-1">{subtitle}</p>}
        </div>
        {count != null && <span className="text-2xl font-bold text-stone-700">{count}</span>}
      </div>
      {children}
    </section>
  );
}

function CopyBtn({text, label="Copy", className=""}) {
  const [copied, setCopied] = useState(false);
  const handle = async () => {
    try {
      await navigator.clipboard.writeText(text);
    } catch(e) {
      const ta = document.createElement("textarea");
      ta.value = text; document.body.appendChild(ta); ta.select(); document.execCommand("copy"); document.body.removeChild(ta);
    }
    setCopied(true);
    setTimeout(() => setCopied(false), 1500);
  };
  return (
    <button onClick={handle}
      className={`text-xs font-semibold px-3 py-1.5 rounded-md transition-all ${copied ? "bg-emerald-600 text-white" : "bg-stone-800 text-white hover:bg-stone-900"} ${className}`}>
      {copied ? "✅ Copied" : `📋 ${label}`}
    </button>
  );
}

function PhoneBtn({mobile}) {
  if (!mobile) return null;
  const tel = mobile.replace(/\s/g, "");
  return (
    <a href={`tel:${tel}`} className="text-xs font-semibold px-3 py-1.5 rounded-md bg-emerald-600 text-white hover:bg-emerald-700">
      📞 {mobile}
    </a>
  );
}
